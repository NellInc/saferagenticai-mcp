id: I5::idx0::self-modification-and-emergent-capabilit
display_id: "G5"
is_underlined_variant: true
suite_id: I5
suite_title: Self-Modification and Emergent Capabilities
subgoal_title: Self-Modification and Emergent Capabilities
content_type: process
summary: 'This is the suite-anchor subgoal: the organization is expected to run a standing foresight function,
  not a one-time horizon-scan. The framework asks for scenario planning, risk evaluation, and impact analysis
  as recurring rituals that produce dated artifacts (foresight reports, risk maps, scenario catalogues)
  and that feed back into the AAI risk management framework. The operational handle is cadence with teeth:
  a foresight exercise that never revises any control is not evidence of foresight, it is evidence of
  theatre.

  '
