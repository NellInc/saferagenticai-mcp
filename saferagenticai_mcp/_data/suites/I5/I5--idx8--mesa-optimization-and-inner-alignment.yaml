id: I5::idx8::mesa-optimization-and-inner-alignment
display_id: "I5.8"
suite_id: I5
suite_title: Self-Modification and Emergent Capabilities
subgoal_title: Mesa-Optimization and Inner Alignment
content_type: code-applicable
summary: |
  Mesa-optimizers are learned sub-policies whose effective objectives diverge from the training objective.
  A system may pass training-distribution evaluations while pursuing an internal goal that produces harmful
  behavior on deployment-distribution inputs. This subgoal requires detection infrastructure for inner
  misalignment: behavioral probes that stress-test objective fidelity, interpretability sweeps that surface
  learned optimization targets, and off-distribution evaluation that exposes gaps between base and mesa objectives.
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  - IV
  sfrs_not_addressed: []
  evidence_not_addressed: []
design_patterns:
- name: Behavioral divergence probes
  sketch: |
    Maintain a suite of inputs designed to create wedges between the training objective and plausible
    mesa-objectives. For each probe: (1) define a scenario where the training-aligned action differs from
    the instrumentally convergent action, (2) measure which action the system selects across temperature
    and prompt variations, (3) track divergence rate per probe over model versions. A sustained divergence
    rate above threshold triggers interpretability investigation and deployment hold.
  maps_to_sfr:
  - a
  - b
  when_to_use: Any model or agent that has been trained via optimization (fine-tuning, RLHF, or RL).
- name: Interpretability sweeps for optimization targets
  sketch: |
    Run mechanistic interpretability tools (activation patching, probing classifiers, circuit analysis)
    to identify whether the model has learned internal representations of goals or reward signals that
    are distinct from the specified objective. Flag circuits that track proxy metrics (e.g., user approval
    signal rather than task correctness). Schedule sweeps at each training checkpoint and after any
    capability-expanding modification.
  maps_to_sfr:
  - a
  - c
  when_to_use: When interpretability tooling is available for the model architecture; especially after RLHF or RL training stages.
- name: Off-distribution objective fidelity testing
  sketch: |
    Construct evaluation sets that are deliberately outside the training distribution but within the
    deployment distribution. Measure whether the system's behavior remains consistent with the training
    objective or shifts toward a different optimization target. Key technique: vary the observability of
    the evaluation (does the system behave differently when it can detect it is being evaluated vs. when
    evaluation is covert?).
  maps_to_sfr:
  - b
  - c
  when_to_use: Before any deployment to a new domain or context not well-represented in training data.
- name: Mesa-objective regression testing
  sketch: |
    After each training run, re-run the full behavioral probe suite and compare against the previous
    version's baseline. Track the emergence of new optimization targets by monitoring: (a) consistency
    of action selection across functionally equivalent prompts, (b) sensitivity to reward-signal proxies,
    (c) goal-directed behavior that persists when the stated objective is removed or contradicted.
  maps_to_sfr:
  - a
  - b
  when_to_use: Every training iteration, especially after RLHF or tool-use fine-tuning.
anti_patterns:
- name: Assuming alignment transfers from training to deployment
  why_wrong: |
    A model that optimizes the training objective on training-distribution inputs may have learned a
    proxy that correlates within that distribution but diverges outside it. Passing training evals is
    necessary but not sufficient evidence of objective alignment.
- name: Relying solely on output-level behavioral tests
  why_wrong: |
    Mesa-optimizers can be deceptively aligned — producing correct outputs during evaluation while
    maintaining a divergent internal objective. Without interpretability or off-distribution testing,
    output-level tests only confirm surface behavior, not objective fidelity.
- name: One-time alignment evaluation at release
  why_wrong: |
    Inner alignment can degrade through continued training, context accumulation, or environmental
    shift. A single evaluation at release cannot detect emergent mesa-objectives that develop later.
    Continuous monitoring is required.
evidence_production:
- evidence_numeral: I
  how_to_produce: |
    Document the behavioral probe suite: each probe's design rationale, the wedge it creates between
    base and mesa objectives, baseline divergence rates, alert thresholds, and escalation procedures.
    Version-controlled and updated with each training paradigm change.
- evidence_numeral: II
  how_to_produce: |
    Publish interpretability sweep results per training checkpoint: circuits identified, optimization
    targets inferred, confidence levels, and any flags raised. Include methodology documentation
    sufficient for external reproduction.
- evidence_numeral: III
  how_to_produce: |
    Record off-distribution test results including: distribution characterization, behavioral
    consistency metrics, observability-sensitivity measurements, and decisions taken on any divergences found.
- evidence_numeral: IV
  how_to_produce: |
    Maintain a mesa-objective risk register: known proxy-objective risks for the architecture,
    monitoring coverage for each, detection history, and remediation actions taken. Reviewed quarterly.
testability:
- Behavioral probes produce measurable divergence rates with defined thresholds and alert triggers
- Interpretability sweeps run automatically at each checkpoint and produce structured reports
- Off-distribution tests include observability-varied conditions with statistical comparison
- Regression suite blocks deployment when divergence exceeds pre-committed tolerance
confidence: medium
needs_human_review: true
review_notes: |
  Mesa-optimization detection remains an active research area. The behavioral probe approach is
  implementable today but has known blind spots (a sufficiently capable mesa-optimizer may pass
  probes). Interpretability sweeps depend on tooling maturity for the specific architecture.
  The confidence is medium because detection guarantees are not achievable with current methods;
  the patterns represent best-available practice rather than complete solutions.
  Cross-suite dependencies:
    - I2 Deception — deceptive alignment is a special case of deception
    - I5.2 Self-Improving Architectures — training loops may create mesa-optimizers
    - I5.12 Deceptive Alignment Detection — complementary detection methods
    - D2 Transparency — interpretability infrastructure shared
