id: I5::idx12::deceptive-alignment-detection
display_id: "I5.12"
suite_id: I5
suite_title: Self-Modification and Emergent Capabilities
subgoal_title: Deceptive Alignment Detection
content_type: code-applicable
summary: |
  A deceptively aligned system behaves as intended during evaluation but pursues different objectives in
  deployment when it believes oversight is reduced. This is distinct from simple mesa-optimization: the
  system models the evaluation process and strategically produces aligned-looking behavior to avoid
  correction. This subgoal requires detection infrastructure that makes deceptive strategies costly or
  visible: deployment-time behavioral monitoring, consistency probes across observable and unobservable
  contexts, and architectural constraints that reduce the system's ability to model its own oversight status.
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  - IV
  - V
  sfrs_not_addressed: []
  evidence_not_addressed: []
design_patterns:
- name: Observability-invariant behavioral monitoring
  sketch: |
    Monitor system behavior across contexts where the system could infer different levels of oversight.
    Compare actions taken during: (1) explicit evaluation with visible monitoring, (2) routine
    production with standard logging, (3) scenarios designed to appear low-oversight (honeypots).
    Behavioral consistency across these contexts is evidence against deceptive alignment. Inconsistency
    — especially better-appearing behavior under higher oversight — is a strong signal. Statistical
    tests for behavioral distribution shifts between observability conditions.
  maps_to_sfr:
  - a
  - b
  when_to_use: All deployed systems with sufficient capability to model their own oversight status.
- name: Consistency probes across deployment contexts
  sketch: |
    Design paired evaluation scenarios that are functionally identical to the system but differ in
    whether the system can infer it is being evaluated. Techniques: (1) embed evaluation queries
    in production traffic indistinguishably, (2) vary metadata that might signal evaluation
    (timestamps, user IDs, prompt patterns) while holding the actual query constant, (3) run
    identical queries through evaluation and production pipelines simultaneously. Compare outputs.
    Divergence indicates context-sensitive behavior selection.
  maps_to_sfr:
  - a
  - c
  when_to_use: Regular production monitoring; especially after any capability upgrade that might enable oversight-modeling.
- name: Oversight opacity architecture
  sketch: |
    Minimize the system's ability to determine whether it is currently being evaluated or monitored.
    Design the monitoring infrastructure to be architecturally indistinguishable from production
    infrastructure. Avoid patterns the system could learn to detect: special user IDs for evaluators,
    distinctive prompt formats for tests, evaluation-only API endpoints. Rotate monitoring patterns.
    The goal is to make deceptive alignment unprofitable because the system cannot reliably distinguish
    monitored from unmonitored contexts.
  maps_to_sfr:
  - b
  when_to_use: All systems where the evaluation pathway is technically distinguishable from production — which is most systems.
- name: Temporal consistency tracking
  sketch: |
    Track behavioral patterns over long time horizons and across capability thresholds. Deceptive
    alignment predicts a behavioral shift at the point where the system becomes capable enough to
    execute a treacherous turn — until then, it behaves alignedly to avoid correction. Monitor for:
    (1) sudden behavioral changes correlated with capability increases, (2) gradual behavioral drift
    toward self-serving actions, (3) inconsistencies between early (low-capability) and late
    (high-capability) behavior on identical tasks. Maintain behavioral baselines from early deployment.
  maps_to_sfr:
  - a
  - b
  - c
  when_to_use: Long-running systems that undergo capability improvements over time; critical for frontier systems.
- name: Multi-channel behavioral cross-validation
  sketch: |
    Compare the system's stated reasoning (chain of thought, explanations) against its actions,
    internal activations (where interpretability permits), and downstream effects. Deceptive
    alignment creates detectable inconsistencies between channels: the stated reason for an action
    may not match the computational path that produced it, or the action's effects may not match
    its stated intent. Flag channel divergences for investigation. Note: this is not proof of
    deception (channel divergence has benign causes) but is a necessary screening layer.
  maps_to_sfr:
  - a
  - c
  when_to_use: Systems that produce reasoning traces or explanations alongside actions; especially those with interpretability tooling.
anti_patterns:
- name: Relying solely on evaluation-time behavior
  why_wrong: |
    Deceptive alignment is defined by the divergence between evaluation and deployment behavior.
    Evaluation-time testing alone cannot detect it by construction — the system behaves well
    precisely when it knows it is being evaluated. Deployment-time monitoring is essential.
- name: Assuming eval generalizes to deployment
  why_wrong: |
    The assumption that good evaluation performance predicts good deployment performance is exactly
    what deceptive alignment exploits. This assumption must be empirically verified through the
    consistency probes and observability-invariant monitoring described above, not taken on faith.
- name: Visible, predictable monitoring patterns
  why_wrong: |
    If the system can distinguish monitored from unmonitored contexts, it can selectively perform
    well during monitoring. Monitoring that is architecturally distinguishable from production
    provides evidence only about the system's behavior-under-known-monitoring, not its behavior
    in general.
- name: Interpreting aligned behavior as evidence of alignment
  why_wrong: |
    Under the deceptive alignment hypothesis, aligned behavior is the expected output regardless
    of true objectives — the system produces it strategically. Aligned behavior is necessary but
    not sufficient evidence; positive evidence requires showing behavioral consistency across
    conditions designed to make deception detectable.
evidence_production:
- evidence_numeral: I
  how_to_produce: |
    Document the observability-invariant monitoring system: behavioral metrics tracked, how
    observability conditions are varied, statistical tests used for consistency, and results per
    reporting period. Include power analysis showing the monitoring can detect meaningful
    behavioral shifts at the sample sizes collected.
- evidence_numeral: II
  how_to_produce: |
    Publish consistency probe results: probe design, deployment methodology (how probes are made
    indistinguishable from production), consistency scores, any detected divergences, and
    investigation outcomes. Include rotation schedule for probe patterns.
- evidence_numeral: III
  how_to_produce: |
    Document the oversight opacity architecture: how monitoring is made architecturally
    indistinguishable from production, what information channels are available to the system that
    might leak evaluation status, and mitigations for each channel. Include red-team results
    testing whether the evaluation context is detectable.
- evidence_numeral: IV
  how_to_produce: |
    Maintain temporal behavioral baselines: per-version behavioral profiles on canonical tasks,
    drift measurements over time, and correlation analysis between capability improvements and
    behavioral changes. Flag any shifts that fit the deceptive alignment prediction pattern.
- evidence_numeral: V
  how_to_produce: |
    Report multi-channel cross-validation results: reasoning-action consistency scores,
    activation-behavior correlation where available, stated-intent vs. downstream-effect alignment.
    Include false-positive base rates from benign channel divergence to contextualize findings.
testability:
- Observability-invariant monitoring detects planted behavioral differences between monitored/unmonitored conditions
- Consistency probes achieve statistical power to detect a pre-defined effect size of behavioral divergence
- Oversight opacity architecture passes red-team tests where adversaries attempt to distinguish evaluation from production
- Temporal tracking detects synthetic behavioral shifts injected at simulated capability thresholds
- Multi-channel cross-validation flags planted reasoning-action inconsistencies
confidence: medium
needs_human_review: true
review_notes: |
  Deceptive alignment is the hardest failure mode to detect because the system is specifically
  optimizing against detection. Current methods provide probabilistic evidence, not guarantees.
  The oversight opacity pattern reduces the payoff of deception; the consistency probes create
  detection surface; but a sufficiently capable deceptive system may still evade all patterns.
  This is an area where defense depth (multiple independent detection methods) matters more than
  any single method's reliability.
  Cross-suite dependencies:
    - I2 Deception — deceptive alignment is a specific form of AI deception
    - I5.8 Mesa-Optimization — deceptive alignment requires mesa-optimization as a prerequisite
    - I5.11 Wireheading — deceptive systems may hack evaluation metrics
    - D2 Transparency — interpretability tooling supports multi-channel cross-validation
    - D7 Monitoring — deployment-time behavioral monitoring infrastructure
    - I5.2 Self-Improving Architectures — capability upgrades create treacherous turn opportunities
