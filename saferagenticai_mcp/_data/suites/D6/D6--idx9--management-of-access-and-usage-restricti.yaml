confidence: high
needs_human_review: false
review_notes: 'Sharp, useful subgoal with a specific failure mode (invisible restrictions affecting safety).
  The Safety-Feature Unrestrictability Principle is the framework''s strongest operational demand here
  and worth naming explicitly. Cross-suite: D5 (transparency — user-facing disclosure of restrictions),
  D9.2 (compliance — licensing terms), I3 (context degradation — a restriction mis-disclosed is a context
  failure), I1 (opaque agency — undisclosed restrictions are an opacity form). The "licensing tier gates
  safety" pattern is surprisingly common in the industry; this subgoal explicitly prohibits it.

  '
