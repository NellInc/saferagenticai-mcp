confidence: high
needs_human_review: false
review_notes: 'Strongly overlapping with I3 (Context Degradation) — consolidation should explicitly wire
  D6.10 and I3 so they don''t diverge; they are the same failure mode seen from the driver and inhibitor
  sides. Pattern treats drift as multi-signal because single-metric drift monitoring is the common failure.
  The governed-retraining gate is the framework''s sharpest operational ask under SFR-c. Cross-suite:
  I3 direct overlap; D5 transparency on drift disclosure; D7 culture- of-safety owning the release pause
  authority.

  '
