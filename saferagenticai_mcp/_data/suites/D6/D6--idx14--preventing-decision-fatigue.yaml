confidence: medium
needs_human_review: true
review_notes: 'All four SFRs marked non-normative in the JSON, and stakeholder list excludes "R" — this
  suggests the subgoal is framed as UX/product quality rather than regulatory compliance. Pattern respects
  that framing but flags that decision fatigue can have compliance consequences (e.g., consent dialogues
  that are too frequent cease to evidence genuine consent under GDPR). Cross-suite: D5 (transparency —
  too much disclosure is its own failure), D11 (or equivalent on human-factors), I3 (context degradation
  — fatigued users carry degraded context). The framework''s "caution by default" intersects with this
  subgoal interestingly: defaulting to confirmation-off for low-stakes actions may be the right balance.
  Tension worth documenting in consolidation.

  '
