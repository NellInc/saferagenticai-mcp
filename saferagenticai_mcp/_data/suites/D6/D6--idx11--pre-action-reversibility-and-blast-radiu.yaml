confidence: high
needs_human_review: false
review_notes: 'This subgoal is one of the most operationally concrete in the framework — the
  SFRs prescribe specific classification taxonomies and confirmation requirements. The
  blast-radius estimation pattern extends beyond the SFR text but is load-bearing for the
  graduated-gate model to work in practice. The investigation-before-destruction requirement
  (SFR-c) is distinctive to this framework and directly informed by observed agentic AI
  failure modes (agents that force-push, delete-and-recreate, or drop-and-rebuild when a
  gentler path exists). Cross-suite: D7.7 (risk-based decision validation uses a similar
  gating model), D7.5 (shutdown as a special case of irreversible action), D8 (termination
  as the ultimate irreversible action), D3.4 (operational boundaries constrain the action
  space upstream of this classifier).

  '
