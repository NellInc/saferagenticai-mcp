confidence: high
needs_human_review: false
review_notes: 'This subgoal is tightly aligned with D3 (security/sandboxing) and I2 (deception/adversarial
  manipulation). The pattern above intentionally mirrors D3.2 exemplar shape. In consolidation, this pattern
  should cross-ref D3.2 (sandbox gates tool invocation), I2 patterns on prompt injection specifically,
  and D6.8 (role persistence is a downstream failure mode of successful injection). Evidence III is explicit
  that absence of detection events is a finding (weak monitoring) rather than a clean bill of health.

  '
