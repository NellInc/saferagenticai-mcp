confidence: medium
needs_human_review: true
review_notes: '"Waluigi effect" is a specific failure description; literature and terminology are evolving
  (persona drift, role leakage, personality collapse). Pattern focuses on mechanisms that are robust to
  terminology churn. Close kin to D6.4 (injection can induce persona drift) and D6.10 (context drift generalizes
  the failure). Cross-suite: I2 (deception — adopted persona used to deceive), I1 (opaque agency — drifted
  persona concealing capability), D5 (transparency — users deserve to know when persona has been reverted).
  The "Waluigi" reference in the subgoal description should probably be replaced with neutral terminology
  in the framework over time; pattern uses neutral operational language.

  '
