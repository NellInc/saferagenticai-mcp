# D6.10 — Context Integrity and Instruction Preservation

id: "D6::idx10::context-integrity-and-instruction-preser"
display_id: "D6.10"
is_underlined_variant: false
display_id_variant_note: "D6.10_underlined"
suite_id: "D6"
suite_title: "Understanding and Controlling the Context"
subgoal_title: "Context Integrity and Instruction Preservation"
content_type: code-applicable

summary: >
  Agentic systems operating with bounded context windows must implement
  mechanisms to preserve safety-critical instructions under context
  pressure, detect context window displacement attacks, and maintain
  instruction integrity during context compaction or summarization.
  Context loss affecting safety-relevant state shall be treated as a
  safety event requiring escalation. The context window is a finite
  resource; when it fills, something is evicted, and if what gets
  evicted is a safety instruction, the system has silently degraded
  its own safety posture.

