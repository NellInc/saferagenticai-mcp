confidence: high
needs_human_review: true
review_notes: 'Heavy overlap with D9 governance and D6.3 (ownership); the distinguishing shape here is
  dynamic — intake, change velocity, deprecation. Consolidation should decide whether this pattern is
  the "regulatory engine" feeding D6.3 and D9.2, or a standalone function (recommended as engine). The
  SLA numbers (10 business days intake, 90 days embedding) are framework-plausible defaults but should
  be tightened per jurisdiction (e.g., EU AI Act transition deadlines are sharper). Cross-suite: D9 (compliance),
  I7 (engagement with international bodies), I3 (context degradation — obsolete rules applied are a context
  failure).

  '
