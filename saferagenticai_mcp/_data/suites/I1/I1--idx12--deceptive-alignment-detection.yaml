confidence: low
needs_human_review: true
review_notes: 'Deceptive alignment is the hardest detection problem in this suite. The
  fundamental challenge is that a sufficiently capable deceptive system may distinguish
  evaluation probes from genuine deployment conditions and behave accordingly, defeating
  any testing regime that the system can model. The process elements here represent
  current best practice (behavioral consistency testing, OOD probing, deployment-time
  sampling) but are acknowledged to be insufficient against a sufficiently capable
  adversary. This is precisely why the process emphasizes ongoing deployment-time
  monitoring: static pre-deployment testing alone cannot provide assurance. Flagged
  needs_human_review because this is an active research frontier with no settled detection
  methodology. Cross-suite: I1.9 (unfaithful CoT is a symptom of deceptive alignment
  when reasoning is strategically unfaithful), I1.10 (emergent capabilities may enable
  deceptive strategies), D7.1 (monitoring infrastructure this subgoal depends on), D1
  (goal alignment is the property being claimed and potentially faked).

  '
