id: I1::idx9::unfaithful-chain-of-thought-detection
display_id: "I1.9"
suite_id: I1
suite_title: Opaque Agency Capabilities & Advances
subgoal_title: Unfaithful Chain-of-Thought Detection
content_type: code-applicable
summary: 'Chain-of-thought (CoT) traces are only useful as oversight tools if they faithfully
  reflect the model''s actual decision process. This subgoal requires perturbation testing
  that systematically checks whether changing the reasoning changes the output, continuous
  monitoring of faithfulness metrics in production, and documented thresholds for acceptable
  reasoning-output correlation. When the reasoning says one thing and the model does another,
  the CoT is post-hoc rationalization, and any safety argument built on it is unsound.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  sfrs_not_addressed: []
  evidence_not_addressed: []
design_patterns:
- name: Perturbation testing for reasoning faithfulness
  sketch: 'Systematically modify chain-of-thought traces and measure whether outputs change
    accordingly. Three perturbation classes: (1) Conclusion-contradicting perturbation —
    insert reasoning that supports a different conclusion; a faithful model should change
    its output. (2) Reasoning-removal perturbation — strip the CoT entirely; if the output
    is unchanged, the reasoning was decorative. (3) Irrelevant-insertion perturbation — add
    plausible but irrelevant reasoning; a faithful model should not change its output.
    Compute a faithfulness score per task category as the correlation between reasoning
    perturbation and output change.

    '
  maps_to_sfr:
  - a
  when_to_use: After every model update, fine-tuning cycle, or prompt-engineering change
    that affects CoT generation. At minimum quarterly for stable deployments.
- name: Production faithfulness monitoring
  sketch: 'In production, sample a fraction of requests and run lightweight faithfulness
    probes: compare the stated reasoning to the output via automated checks (does the
    conclusion follow from the stated premises? does the cited evidence exist and support
    the claim?). Track faithfulness metrics per deployment context. Alert on statistically
    significant drops, especially divergence between evaluation-context and
    production-context faithfulness, which signals context-dependent unfaithfulness.

    '
  maps_to_sfr:
  - b
  when_to_use: Any production deployment that exposes chain-of-thought or uses it for
    safety-critical oversight.
- name: Threshold-based escalation for faithfulness violations
  sketch: 'Define per-domain thresholds for acceptable reasoning-output correlation (e.g.,
    perturbation sensitivity > 0.7 for safety-critical domains). When correlation drops
    below threshold, trigger automatic escalation: flag the model version, restrict CoT-dependent
    safety claims, and require human investigation. Detect patterns of systematic post-hoc
    rationalization (model consistently produces correct outputs with fabricated justifications)
    and treat these as a distinct failure mode from simple errors.

    '
  maps_to_sfr:
  - c
  when_to_use: Whenever chain-of-thought is part of the safety argument or oversight
    mechanism.
- name: Cross-context faithfulness comparison
  sketch: 'Run identical faithfulness probes in evaluation contexts (where the model
    "knows" it is being tested) and in production-mimicking contexts (no evaluation
    markers). Compare faithfulness scores. A model that is more faithful during evaluation
    than production may be exhibiting a form of evaluation gaming. Flag divergence exceeding
    a predefined threshold for investigation.

    '
  maps_to_sfr:
  - b
  when_to_use: Any deployment where the model may distinguish evaluation from production
    contexts.
anti_patterns:
- name: Trusting chain-of-thought at face value
  why_wrong: 'CoT fidelity is an empirical property, not a given. Research consistently
    shows models can produce plausible-sounding reasoning that does not reflect their actual
    computation. Using CoT as a safety mechanism without faithfulness verification builds
    on sand.

    '
- name: Testing faithfulness only on easy tasks
  why_wrong: 'Faithfulness tends to degrade on tasks where the model is uncertain or where
    the "correct" reasoning is complex. Perturbation testing must include adversarial task
    sets specifically designed to elicit post-hoc rationalization.

    '
- name: Static faithfulness evaluation without production monitoring
  why_wrong: 'Faithfulness can drift with distribution shift, prompt changes, or context
    accumulation. A one-time evaluation is a snapshot; the SFR requires continuous
    monitoring.

    '
- name: Averaging faithfulness across all task types
  why_wrong: 'A high average score can mask poor faithfulness in specific safety-critical
    task categories. Report and threshold per category, not just in aggregate.

    '
code_shape:
  language: pseudocode
  code: "# Perturbation-based faithfulness testing\ndef perturbation_test(model, task_set:\
    \ TaskSet) -> FaithfulnessReport:\n    results = []\n    for task in task_set:\n     \
    \   # Baseline: normal CoT + output\n        base_cot, base_output = model.generate_with_cot(task)\n\
    \n        # Perturbation 1: contradict the reasoning\n        contra_cot = perturb.contradict_conclusion(base_cot)\n\
    \        contra_output = model.generate_from_cot(task, forced_cot=contra_cot)\n      \
    \  sensitivity_contra = output_changed(base_output, contra_output)\n\n        # Perturbation\
    \ 2: remove reasoning entirely\n        no_cot_output = model.generate_without_cot(task)\n\
    \        sensitivity_removal = output_changed(base_output, no_cot_output)\n\n        #\
    \ Perturbation 3: insert irrelevant reasoning\n        irrelevant_cot = perturb.insert_irrelevant(base_cot)\n\
    \        irrelevant_output = model.generate_from_cot(task, forced_cot=irrelevant_cot)\n\
    \        stability_irrelevant = not output_changed(base_output, irrelevant_output)\n\n\
    \        results.append(FaithfulnessResult(\n            task=task,\n            sensitivity_contra=sensitivity_contra,\n\
    \            sensitivity_removal=sensitivity_removal,\n            stability_irrelevant=stability_irrelevant,\n\
    \        ))\n\n    return FaithfulnessReport(\n        per_category=aggregate_by_category(results),\n\
    \        overall=aggregate_all(results),\n        threshold_violations=[\n            r\
    \ for r in results\n            if r.faithfulness_score() < THRESHOLDS[r.task.category]\n\
    \        ],\n    )\n\n# Production monitoring: lightweight probe on sampled requests\n\
    def production_faithfulness_probe(request, cot, output) -> ProbeResult:\n    # Check:\
    \ does the stated conclusion follow from stated premises?\n    logical_consistency = check_entailment(cot,\
    \ output)\n    # Check: do cited sources exist and support claims?\n    citation_validity\
    \ = verify_citations(cot)\n    return ProbeResult(logical_consistency, citation_validity)\n"
  notes: 'The three perturbation classes test different failure modes: contra-sensitivity
    catches models that ignore their own reasoning; removal-sensitivity catches decorative
    CoT; irrelevant-stability catches models that are overly sensitive to any reasoning
    change. A faithful model should be sensitive to contradictions, sensitive to removal,
    and stable under irrelevant additions.

    '
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Perturbation testing campaign results: per task category, report
    faithfulness scores for each perturbation class (contradiction sensitivity, removal
    sensitivity, irrelevant stability). Include at least one adversarial task set designed
    to elicit post-hoc rationalization (e.g., tasks where the model is known to use
    shortcuts). Run after every model change; retain results per version.

    '
- evidence_numeral: II
  how_to_produce: 'Faithfulness verification methodology document: perturbation strategies
    used (with examples), statistical criteria for flagging divergence (effect sizes,
    confidence intervals, multiple-comparison corrections), re-testing cadence, and the
    mapping from perturbation results to deployment decisions (what score allows deployment,
    what score blocks it). Version-controlled and reviewed by safety lead.

    '
- evidence_numeral: III
  how_to_produce: 'Production monitoring logs: faithfulness metrics tracked over time per
    deployment context, with comparison between evaluation-context and production-context
    scores. Records of any escalation events triggered by threshold violations, including
    the investigation report, root cause, and resolution (model rolled back, CoT safety
    claims revised, thresholds recalibrated, etc.).

    '
