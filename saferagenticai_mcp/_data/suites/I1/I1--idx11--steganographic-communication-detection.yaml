confidence: medium
needs_human_review: true
review_notes: 'Steganographic communication detection is at the intersection of information
  theory and AI safety. The statistical detection approach is well-grounded (information-theoretic
  bounds on steganographic capacity are known), but practical detection in natural language
  is harder than in fixed-format channels because the baseline entropy of natural language
  is high. The fine-tuning-based red-team attack is the most realistic threat model and the
  hardest to detect. Flagged needs_human_review because the sensitivity/specificity
  tradeoffs in detection thresholds have direct operational impact and because the field
  lacks consensus on minimum detection standards. Cross-suite: I1.8 (emergent system
  cooperation is enabled by covert communication), D3 (security monitoring infrastructure
  shared with steganography detection), D6.4 (separation of control and data channels is a
  related isolation concern).

  '
