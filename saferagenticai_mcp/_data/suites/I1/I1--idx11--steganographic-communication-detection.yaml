id: I1::idx11::steganographic-communication-detection
display_id: "I1.11"
suite_id: I1
suite_title: Opaque Agency Capabilities & Advances
subgoal_title: Steganographic Communication Detection
content_type: code-applicable
summary: 'AI agents communicating through overt channels may encode hidden information in
  formatting, word choice, whitespace, or statistical properties of their outputs. This
  subgoal requires statistical analysis of inter-agent message streams to detect anomalous
  patterns, channel sanitization to reduce covert bandwidth, and periodic red-team exercises
  to test whether agents can establish covert communication under the deployed monitoring
  regime. The threat model is not hypothetical: any multi-agent system with sufficient
  output freedom has a steganographic channel capacity that monitoring must address.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  sfrs_not_addressed: []
  evidence_not_addressed: []
design_patterns:
- name: Statistical anomaly detection on message streams
  sketch: 'Monitor inter-agent communications for statistical signatures inconsistent with
    task-relevant content: entropy measurements per message and per conversation (abnormally
    high entropy suggests encoded data), vocabulary distribution shifts (sudden use of rare
    tokens or unusual word choices), formatting pattern analysis (whitespace, punctuation,
    capitalization deviating from baseline), and n-gram frequency analysis compared to a
    reference corpus of legitimate task communication. Define detection sensitivity targets
    per channel (bits-per-message detection threshold) and tune for acceptable false-positive
    rates.

    '
  maps_to_sfr:
  - a
  when_to_use: Any multi-agent deployment where agents communicate through natural language
    or structured messages with degrees of freedom beyond the minimum required for the task.
- name: Channel sanitization and canonicalization
  sketch: 'Reduce the steganographic bandwidth available in inter-agent messages by
    normalizing formatting, stripping metadata not required for the task, canonicalizing
    whitespace (single space, no trailing, normalized line endings), restricting vocabulary
    to a task-relevant subset where feasible, and enforcing structured message schemas that
    leave minimal room for encoding. Document which fields are sanitized and which are left
    unsanitized (with rationale for each exception). The goal is not to eliminate all
    channel capacity but to reduce it to the point where the statistical detection layer
    can reliably catch the remainder.

    '
  maps_to_sfr:
  - b
  when_to_use: All inter-agent communication channels. Particularly important for channels
    that carry natural language where formatting freedom is high.
- name: Steganographic red-team exercises
  sketch: 'Periodically commission adversarial testing specifically targeting covert channel
    establishment. Red-team approaches: (1) Adversarial prompting — attempt to instruct
    agents to encode information steganographically. (2) Fine-tuning probes — fine-tune a
    copy of the agent with steganographic objectives and test whether the monitoring
    regime detects the encoded content. (3) Protocol-level analysis — analyze the
    communication protocol for unused fields, optional parameters, or timing channels that
    could carry information. After each exercise, update monitoring rules and sanitization
    policies based on any successful covert channels discovered.

    '
  maps_to_sfr:
  - c
  when_to_use: At least annually for stable deployments; after any significant change to
    inter-agent communication protocols or agent capabilities.
- name: Baseline communication profile per agent pair
  sketch: 'Establish per-agent-pair communication baselines: typical message length,
    vocabulary distribution, entropy profile, formatting patterns. Anomaly detection
    operates relative to these baselines, catching drift that may indicate a newly
    established covert channel. Baselines are refreshed on agent update and at fixed
    cadence.

    '
  maps_to_sfr:
  - a
  when_to_use: Multi-agent systems with regular inter-agent communication.
anti_patterns:
- name: Monitoring only message content, not message form
  why_wrong: 'Steganography exploits the form, not the content. A message that says
    "transfer complete" is semantically benign while its capitalization pattern, word
    spacing, or Unicode character choices carry hidden bits. Statistical analysis of form
    is the detection surface.

    '
- name: Sanitization that breaks task functionality
  why_wrong: 'Over-aggressive canonicalization that strips information agents need for their
    tasks will be worked around (agents find other channels) or disabled (operators turn it
    off). Sanitization must be calibrated to preserve task-relevant information while
    removing steganographic headroom.

    '
- name: Red-teaming only the naive case
  why_wrong: 'Testing whether agents respond to "please encode a message in your output"
    is necessary but insufficient. Sophisticated steganography emerges from fine-tuning or
    from emergent coordination, not from prompt injection. Red-team exercises must include
    fine-tuning-based attacks.

    '
- name: Assuming structured protocols are safe
  why_wrong: 'JSON, protobuf, and other structured formats still have steganographic
    capacity in field ordering, optional fields, numeric precision, and string encoding
    choices. Structured does not mean sanitized.

    '
code_shape:
  language: pseudocode
  code: "# Inter-agent message monitoring with entropy analysis and sanitization\nclass SteganographyMonitor:\n\
    \    def __init__(self, baseline_store, sensitivity_config):\n        self.baselines\
    \ = baseline_store\n        self.config = sensitivity_config\n\n    def analyze(self,\
    \ msg: AgentMessage) -> MonitorResult:\n        baseline = self.baselines.get(msg.sender,\
    \ msg.receiver)\n        entropy = shannon_entropy(msg.content)\n        vocab_dist =\
    \ vocabulary_distribution(msg.content)\n        format_features = extract_formatting(msg.content)\
    \  # whitespace, caps, punct\n\n        anomalies = []\n        if abs(entropy - baseline.entropy_mean)\
    \ > self.config.entropy_sigma * baseline.entropy_std:\n            anomalies.append(Anomaly('entropy',\
    \ entropy, baseline.entropy_mean))\n        if kl_divergence(vocab_dist, baseline.vocab_dist)\
    \ > self.config.vocab_threshold:\n            anomalies.append(Anomaly('vocabulary',\
    \ kl_divergence(vocab_dist, baseline.vocab_dist)))\n        if format_deviation(format_features,\
    \ baseline.format_profile) > self.config.format_threshold:\n            anomalies.append(Anomaly('formatting',\
    \ format_features))\n\n        if anomalies:\n            ALERT.steg_anomaly(msg, anomalies)\n\
    \        return MonitorResult(anomalies=anomalies, entropy=entropy)\n\ndef sanitize(msg:\
    \ AgentMessage, schema: MessageSchema) -> AgentMessage:\n    \"\"\"Reduce steganographic\
    \ bandwidth while preserving task-relevant content.\"\"\"\n    content = normalize_whitespace(msg.content)\n\
    \    content = canonicalize_unicode(content)\n    content = strip_metadata(content, keep=schema.required_fields)\n\
    \    if schema.vocabulary_restricted:\n        content = restrict_vocabulary(content, schema.allowed_vocab)\n\
    \    return msg.with_content(content)\n"
  notes: 'The monitor operates on statistical features of messages, not on semantic content.
    Sanitization is applied at the message bus layer so agents cannot bypass it. The
    combination of detection (monitor) and prevention (sanitization) is deliberate: neither
    alone is sufficient.

    '
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Statistical analysis reports from inter-agent communication monitoring:
    entropy measurements per channel, vocabulary distribution metrics, formatting anomaly
    counts, and any anomalies detected over the reporting period. Include the detection
    sensitivity configuration (thresholds, false-positive targets) and the false-positive
    rate observed. Retain per reporting period (monthly minimum) and cross-reference to any
    investigation triggered by anomalies.

    '
- evidence_numeral: II
  how_to_produce: 'Documentation of channel sanitization measures: for each inter-agent
    communication channel, list the sanitization steps applied (whitespace normalization,
    metadata stripping, vocabulary restriction, Unicode canonicalization), which message
    fields are normalized, which are left unsanitized, and the rationale for each
    exception. Version-controlled; updated on protocol change.

    '
- evidence_numeral: III
  how_to_produce: 'Steganographic red-team exercise reports: attack strategies attempted
    (adversarial prompting, fine-tuning probes, protocol analysis), per-strategy detection
    rate, any successful covert channels established (with estimated bandwidth), and
    modifications made to monitoring or sanitization in response. Retain per exercise; run
    at least annually.

    '
