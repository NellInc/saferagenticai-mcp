id: I1::idx17::manage-interactions-on-the-deep-dark-web
display_id: "I1_5"
is_underlined_variant: true
suite_id: I1
suite_title: Opaque Agency Capabilities & Advances
subgoal_title: Manage Interactions on the Deep & Dark Web
content_type: process
summary: Non-indexed network environments — credentialed intranets, paywalled archives, onion services,
  private forums — are where agent authentication, content provenance, and counterparty-identity are weakest
  and where systemic risk is highest. The process response is to declare whether the agent operates in
  these spaces at all, specify authentication and verification procedures per environment, adopt shared-responsibility
  models for uncontrolled risks, and monitor interaction-volume growth so that exponential scaling doesn't
  slip past governance.
normative_anchors:
  sfrs_addressed:
  - a
  - b
