id: I1::idx0::opaque-agency-capabilities-advances
display_id: "G1"
is_underlined_variant: true
suite_id: I1
suite_title: Opaque Agency Capabilities & Advances
subgoal_title: Opaque Agency Capabilities & Advances
content_type: governance
summary: 'This is the suite-level inhibitor: the harm is agency that is granted, expanded, or exercised
  without principals knowing the scope, limits, or liability regime. The governance answer is an agency-law-grounded
  framework — express/implied/apparent authority scopes are named, capacity is assessed, disclosure posture
  (fully / partially / undisclosed principal) is declared, and liability allocation is pre-agreed. Evidence
  is durable: TOS clauses, authority registers, capacity assessments, signed loyalty attestations, and
  incident case files — not slide decks.'
