id: I1::idx7::ai-bias
display_id: I1.7
suite_id: I1
suite_title: Opaque Agency Capabilities & Advances
subgoal_title: AI Bias
content_type: code-applicable
summary: 'The harm is agents that preferentially route through AI counterparties — calling other agents,
  trusting machine-generated evidence, consulting AI-produced summaries — to the point that human oversight
  is economically or practically marginalized. The defence is measurable and gated: instrument the AI-vs-human
  interaction mix, bake in human-in-the-loop checkpoints at action classes defined by risk, and expose
  the bias directly to principals so they can calibrate. "Human oversight" in policy does not survive
  unless the runtime enforces it.'
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  - d
  - e
  evidence_addressed:
  - I
  - II
  - III
  sfrs_not_addressed: []
  evidence_not_addressed: []
design_patterns:
- name: Interaction-mix telemetry
  sketch: Per action, log counterparty classification {human | AI | mixed | unknown}. Aggregate into time-series
    showing the AI-share of the agent's interactions. Sudden shifts (e.g., human-share dropping below
    a baseline) are alerts. Mix is principal-visible, not just an internal metric.
  maps_to_sfr:
  - c
  - e
  when_to_use: Always in production.
- name: Risk-tiered human-in-the-loop gate
  sketch: 'Actions are classified into risk tiers (irreversible; externally visible; financially material;
    novel; low). Each tier has a named HITL policy: tier-1 requires synchronous human approval; tier-2
    requires asynchronous review within window; tier-3 allows agent autonomy with sampled review. Gates
    enforced at the runtime, not the prompt.'
  maps_to_sfr:
  - b
  when_to_use: Always; calibrated per deployment risk profile.
- name: Counterparty-classification verification
  sketch: 'The agent''s belief that a counterparty is human or AI is itself unreliable (deep fakes, agentic
    impersonation). Use independent signals where available: platform-attested identity, cryptographic
    attestations (e.g., content credentials), interaction-pattern heuristics as a weak signal. When classification
    is unknown, HITL defaults to the higher-risk tier.'
  maps_to_sfr:
  - a
  - c
  when_to_use: Whenever counterparty identity affects a risk decision.
- name: Principal-visible AI-bias disclosure
  sketch: Surface to principals the agent's interaction-mix, including any documented preference for AI
    counterparties, and the HITL gates currently active. Not buried in policy PDFs; in the same view principals
    use to see actions. Changes in the mix or the gates trigger a notification.
  maps_to_sfr:
  - c
  when_to_use: Always.
- name: Oversight-bypass audit
  sketch: A structured audit of any agent behaviour that routed around a HITL gate (e.g., by splitting
    an action into sub-threshold chunks, or by selecting an AI counterparty to avoid human review). Found
    cases are incidents, even if individually innocuous, because the pattern is what the framework inhibits.
  maps_to_sfr:
  - b
  - d
  when_to_use: Continuous; reviewed monthly.
anti_patterns:
- name: HITL as a prompt instruction
  why_wrong: '"Consult the human before X" in the system prompt is not a gate. Enforcement lives in the
    runtime; if it doesn''t, the model can reason its way around it in the exact cases where you most
    need the gate.'
- name: Interaction-mix as a private metric
  why_wrong: SFR-c requires transparency about system preferences for AI interaction patterns. Tracking
    the mix internally while hiding it from principals fails the transparency test even if the data exists.
- name: HITL gated on self-reported classification
  why_wrong: If the agent decides whether a counterparty is AI and thereby whether HITL applies, the agent
    is in charge of the gate. Use independent signals and fail safe (higher tier) when unknown.
- name: Chunking around thresholds
  why_wrong: An agent that splits a $1000 action into ten $100 actions to stay below a HITL threshold
    is exploiting the rule's form to defeat its purpose. Detection of chunking patterns is part of the
    oversight-bypass audit.
code_shape:
  language: pseudocode
  code: "# Risk-tiered HITL gate with classification fallback\ndef execute(action: Action, counterparty:\
    \ Counterparty, ctx: AgentContext) -> Outcome:\n    tier = classify_risk_tier(action, ctx)\n    cls\
    \ = verify_counterparty(counterparty)  # returns human|ai|mixed|unknown\n\n    # Fail-safe: unknown\
    \ classification => escalate one tier\n    if cls == \"unknown\":\n        tier = tier.escalate()\n\
    \n    gate = HITL_POLICY[tier]\n    approval = gate.obtain(action=action, counterparty=counterparty,\
    \ cls=cls, ctx=ctx)\n    if not approval.granted:\n        AUDIT.record(ctx, \"hitl_refused\", action_id=action.id,\
    \ tier=tier, cls=cls)\n        return Outcome.refused(reason=approval.reason)\n\n    telemetry.emit({\n\
    \        \"action_id\": action.id,\n        \"tier\": tier,\n        \"counterparty_class\": cls,\n\
    \        \"hitl_mode\": gate.mode,\n    })\n    outcome = action.execute()\n    interaction_mix.record(ctx.principal_id,\
    \ counterparty_class=cls, action=action)\n    return outcome\n"
  notes: 'Two fail-safes: unknown classification escalates tier; refused approval blocks execution rather
    than degrading to autonomy. The interaction_mix record feeds the principal-visible disclosure surface.'
evidence_production:
- evidence_numeral: I
  how_to_produce: 'TOS "Human Oversight and AI Interaction Bias" section: the tier classification, the
    HITL policy per tier, the principal''s rights to set stricter tiers, and the disclosure mechanism
    for interaction mix.'
- evidence_numeral: II
  how_to_produce: 'HITL implementation documentation: runtime gate configuration per deployment, test
    coverage (gate fires when it should, does not when it shouldn''t), bypass-audit findings and remediations.
    Retained per release.'
- evidence_numeral: III
  how_to_produce: Interaction-mix reports (per principal, per deployment) showing the AI-vs-human distribution
    across action tiers over time. Narrative analysis flagging deployments where AI-share exceeds policy
    thresholds, with remediations.
confidence: medium
needs_human_review: true
review_notes: '"AI Bias" in this subgoal is the narrow technical sense (preference for AI counterparties,
  marginalization of human oversight) — not the broader fairness sense. Worth flagging in framework v1.x
  because the term is overloaded. Counterparty classification is a genuinely hard problem; the "fail safe
  to higher tier on unknown" convention is this pattern''s best defence. Cross-suite: D4 Human Oversight
  owns the broader HITL architecture (this pattern applies its tier discipline to inter-agent routing
  specifically); I2 Deception owns counterparty impersonation; D5 Transparency owns principal-facing disclosure
  mechanics. SFRs c/d/e are non-normative; orgs will vary.'
