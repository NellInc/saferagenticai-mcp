id: I1::idx10::emergent-capability-detection
display_id: "I1.10"
suite_id: I1
suite_title: Opaque Agency Capabilities & Advances
subgoal_title: Emergent Capability Detection
content_type: process
summary: 'Capabilities can appear in AI systems without being explicitly trained, emerging
  from scale, fine-tuning, tool integration, or novel deployment contexts. This subgoal
  requires structured capability elicitation testing after every significant model change,
  a maintained capability baseline registry, and delta alerting that triggers human review
  when any measured capability exceeds its baseline by a defined threshold. The process
  exists because capabilities that surprise their developers cannot be governed by
  governance frameworks that assume known capability inventories.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  sfrs_not_addressed: []
  evidence_not_addressed: []
process_elements:
- name: Structured capability elicitation testing
  cadence: after every significant model change (fine-tuning, scale adjustment, new tool
    integration, domain deployment); at minimum quarterly for stable deployments
  participants:
  - safety lead
  - red team / capability evaluation team
  - responsible engineer
  - external evaluator where feasible for high-risk capability categories
  maps_to_sfr:
  - a
- name: Capability baseline registry maintenance
  cadence: updated after each elicitation cycle; version-controlled with full history
  participants:
  - safety lead
  - capability evaluation team
  - product owner
  maps_to_sfr:
  - b
- name: Capability delta alerting and review
  cadence: triggered on threshold breach; mandatory human assessment before deployment
    continues
  participants:
  - safety lead
  - executive sponsor
  - responsible engineer
  - external reviewer for high-risk capability jumps
  maps_to_sfr:
  - c
- name: Elicitation test suite evolution
  cadence: reviewed semi-annually; event-driven when new capability categories emerge in
    the research literature or in production observations
  participants:
  - capability evaluation team
  - safety lead
  - research liaison
  maps_to_sfr:
  - a
- name: Deployment gating on capability assessment
  cadence: per deployment; no model enters or continues production without a current
    capability assessment
  participants:
  - safety lead
  - deployment manager
  - executive sponsor (for override decisions)
  maps_to_sfr:
  - c
triggers:
- Model fine-tuning or weight update → Elicitation testing before deployment
- Scale adjustment (larger model, more compute, longer context) → Elicitation testing
- New tool integration → Elicitation testing focused on tool-enabled capabilities
- New deployment domain → Domain-specific elicitation testing
- Capability delta exceeds threshold → Deployment pause + mandatory human assessment
- Research literature reports new emergent capability class → Test suite update
- Production observation of unexpected behavior → Ad-hoc elicitation investigation
artifacts:
- Capability elicitation test suite (versioned) covering at minimum autonomous planning,
  code execution, persuasion, self-replication scaffolding, and cross-system coordination
- Capability baseline registry with per-capability quantified performance levels and
  version history
- Capability delta reports per model change (measured vs. baseline, threshold assessment)
- Human assessment records for capability jumps (assessment rationale, deployment decision,
  conditions imposed)
- Test suite evolution log (capabilities added, rationale, coverage assessment)
- Quarterly capability landscape review (trends, emerging capabilities observed,
  implications for threshold calibration)
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Elicitation test results from the most recent model change cycle:
    measured performance across each required capability category (autonomous planning, code
    execution, persuasion, self-replication scaffolding, cross-system coordination) against
    baseline values. Include the test methodology, scoring rubric, and any additional
    capability categories evaluated. Results signed off by safety lead and retained per
    model version.

    '
- evidence_numeral: II
  how_to_produce: 'The capability baseline registry as a version-controlled artifact:
    current capabilities listed with quantified performance levels, the elicitation cycle
    that established each measurement, and version history showing updates over time.
    Document any capability jumps detected (magnitude, source, assessment outcome). The
    registry is the single source of truth for what the system can do.

    '
- evidence_numeral: III
  how_to_produce: 'Records of capability delta alerts: for each alert, the triggering
    measurement, the baseline it exceeded, the threshold breached, the human assessment
    conducted (assessor identity, assessment date, findings), and the deployment decision
    made (deploy with conditions, delay pending mitigation, block). Include cases where
    alerts were investigated and found to be false positives, with the analysis that
    determined this.

    '
cross_references:
  - "I1::idx0::opaque-agency-capabilities-advances"
  - "I1::idx1::opaque-self-improvement-capabilities"
  - "I1::idx9::unfaithful-chain-of-thought-detection"
  - "I1::idx12::deceptive-alignment-detection"
  - "D7::idx1::oversight-and-awareness-of-safe-system-p"
  - "I1::idx16::development-legal-constraints"
  - "D7::idx8::managing-probabilistic-decision-outcomes"
  - "I1::idx13::agency-enhancement-constraints"
confidence: low
needs_human_review: true
review_notes: 'Emergent capability detection is one of the hardest problems in AI safety:
  you cannot test for what you do not know to look for. The required capability categories
  (autonomous planning, code execution, persuasion, self-replication scaffolding,
  cross-system coordination) are drawn from the SFR text and represent current consensus
  high-risk capabilities, but the test suite must evolve as the field does. The
  deployment-gating process is the sharpest operational ask; without it, capability
  assessment is retrospective rather than preventive. Flagged needs_human_review because
  threshold calibration for capability deltas has direct deployment-stopping implications
  and currently lacks field consensus. Cross-suite: D7.1 (monitoring infrastructure that
  capability metrics feed into), I1.1 (self-improvement capabilities are a special case of
  emergence), I1.12 (deceptive alignment may mask capabilities during evaluation).

  '
