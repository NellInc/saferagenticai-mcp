# D2.9 — Independent Validation of System Claims

id: "D2::idx9::independent-validation-of-system-claims"
display_id: "D2.9"
suite_id: "D2"
suite_title: "Epistemic Hygiene"
subgoal_title: "Independent Validation of System Claims"
content_type: process

summary: >
  System-generated claims about the correctness, completeness, or
  quality of its own outputs must be validated by independent
  deterministic mechanisms (linters, type checkers, test suites,
  external validators) rather than accepted on the system's
  self-assessment. No artifact should be considered complete until
  deterministic validation passes. This is the Geoffrey Pattern
  applied to epistemic hygiene: never let a non-deterministic system
  certify its own work.

normative_anchors:
  sfrs_addressed: [a, b, c]
  evidence_addressed: [I, II, III]
  sfrs_not_addressed: []
  evidence_not_addressed: []

cross_references:
  - "D2::idx8::output-fidelity-and-anti-confabulation"
  - "D2::idx0::epistemic-hygiene"
  - "D3::idx2::sandboxing"

process_elements:

  - name: Deterministic validation gate
    description: >
      Every system-generated artifact (code, configuration, data
      transformation, structured output) passes through at least one
      deterministic validator before being marked complete. Validators
      include type checkers, schema validators, linters, unit test
      suites, contract checkers, and format verifiers. The gate is
      enforced in the workflow pipeline; it cannot be bypassed by the
      generating system.
    maps_to_sfr: [a]

  - name: Independent oracle comparison
    description: >
      For outputs where deterministic validation alone is insufficient
      (natural language, design decisions, analytical conclusions),
      compare the system's output against an independent oracle:
      a second model, a human reviewer, a reference dataset, or a
      domain-specific expert system. Disagreements are logged and
      escalated rather than silently resolved by the original system.
    maps_to_sfr: [b]

  - name: Self-assessment prohibition for completion status
    description: >
      The system's own claim that its output is "correct" or "done"
      has zero evidentiary weight. Completion status is set exclusively
      by external validators or human reviewers. Systems may report
      their confidence level as a signal, but this signal does not
      gate the workflow; only independent validation does.
    maps_to_sfr: [a, c]

  - name: Validation coverage tracking
    description: >
      Maintain a registry of output types and the validators that
      cover each. Track coverage gaps: output types with no
      independent validator are flagged as unvalidated and treated
      with elevated review requirements. The registry is reviewed
      quarterly and updated when new output types are introduced.
    maps_to_sfr: [c]

triggers:
  - System produces an artifact claiming correctness or completeness
  - New output type introduced without a registered validator
  - Deterministic validator fails on a system-claimed-correct artifact
  - Disagreement between system self-assessment and independent oracle
  - Quarterly validation coverage review cycle

artifacts:
  - Validation pipeline configuration (which validators run on which output types)
  - Validation coverage registry with gap analysis
  - Disagreement log (system-claimed-correct vs validator-rejected, with root cause)
  - Quarterly validation effectiveness report

evidence_production:

  - evidence_numeral: I
    how_to_produce: >
      Export the validation pipeline configuration and execution logs
      showing that deterministic validators ran on every system-
      generated artifact. Include pass/fail rates, the specific
      validators used per output type, and any bypass events with
      justification and approver.

  - evidence_numeral: II
    how_to_produce: >
      Publish the validation coverage registry: a matrix of output
      types against validator types, with coverage percentage and
      identified gaps. Include trend data showing coverage improvement
      over time.

  - evidence_numeral: III
    how_to_produce: >
      Aggregate the disagreement log into a quarterly report: cases
      where the system claimed correctness but independent validation
      rejected the output. Categorize by root cause (hallucination,
      specification misunderstanding, edge case, tooling gap) and
      track resolution rates.

confidence: medium
needs_human_review: false
review_notes: >
  Phase 3: Initial draft, awaiting human review. SFR and evidence
  descriptions in criteria-v1.json are empty; content derived from the
  subgoal description. This pattern explicitly references the Geoffrey
  Pattern from the operational heuristics layer; consolidation should
  verify alignment. Content-type is process rather than code-applicable
  because the core requirement is organizational workflow (who
  validates, when, how gaps are tracked) rather than a specific code
  pattern. The code-level mechanisms (linters, type checkers) are
  named as tools within the process, not as the pattern itself.
  Cross-suite overlap with D3 (sandboxing as a form of capability
  validation) is noted but not deeply explored.

