id: D7::idx8::managing-probabilistic-decision-outcomes
display_id: "D7_1"
is_underlined_variant: true
display_id_variant_note: "D7.1_underlined"
suite_id: D7
suite_title: Achieving and Sustaining a Safe System Profile
subgoal_title: Managing Probabilistic Decision Outcomes
content_type: code-applicable
summary: 'Agent outputs are distributions, not points. This subgoal asks the system to reason explicitly
  about that distribution: enumerate plausible outcomes, quantify uncertainty, mitigate high-probability-high-impact
  scenarios first, monitor for deviation in outcome likelihoods, and escalate to humans when uncertainty
  crosses a documented threshold. Close sibling of D7.7 (human validation) — D7.7 gates on decision *risk*;
  D7.8 gates on decision *uncertainty*.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
