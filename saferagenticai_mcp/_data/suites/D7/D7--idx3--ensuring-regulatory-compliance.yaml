id: D7::idx3::ensuring-regulatory-compliance
display_id: D7.3
suite_id: D7
suite_title: Achieving and Sustaining a Safe System Profile
subgoal_title: Ensuring Regulatory Compliance
content_type: governance
summary: 'Regulatory compliance for agentic AI is a moving target across many jurisdictions and sector
  regulators. This subgoal expects a durable compliance program, not a one-time certification: a maintained
  register of applicable requirements, continuous monitoring against it, a rapid update path when standards
  change, periodic audit, and named humans accountable for each domain. Deeply overlaps the D9 governance
  suite; D7.3 is the sustain-it-over-time lens on that apparatus.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
