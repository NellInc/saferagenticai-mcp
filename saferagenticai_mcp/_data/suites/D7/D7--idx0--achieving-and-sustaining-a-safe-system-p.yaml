suite_id: D7
suite_title: Achieving and Sustaining a Safe System Profile
subgoal_title: Achieving and Sustaining a Safe System Profile
content_type: process
summary: 'D7 as a whole asks: what keeps an AAI system safe after launch day, when the team changes, the
  model drifts, and the deployment context evolves? The answer is a *safety management system* — a named,
  funded, audited program that integrates design-time assurance, runtime monitoring, incident learning,
  and periodic re-qualification. This umbrella subgoal is best treated as the outer scaffold; the specific
  mechanisms live in D7.1 through D7.7 and the underlined-variant subgoals.

  '
