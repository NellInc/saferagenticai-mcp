id: D7::idx11::preventing-ai-addiction-and-dependency
display_id: "D7_4"
is_underlined_variant: true
display_id_variant_note: "D7.4_underlined"
suite_id: D7
suite_title: Achieving and Sustaining a Safe System Profile
subgoal_title: Preventing AI Addiction and Dependency
content_type: code-applicable
summary: 'AI companions that offer unconditional regard, perfect memory, and unlimited availability are
  supernormal stimuli — they outcompete human relationships not because they are better but because they
  are easier. This subgoal asks for product-level controls: usage monitoring that detects dependency patterns,
  graduated interventions, bounded emotional / financial / frequency engagement, AI-disclosure, reporting
  channels for concerned parties, hardened protections for vulnerable users, and user-facing self-management
  tools. Code-heavy because the controls must be enforced by the system, not promised in policy.

  '
