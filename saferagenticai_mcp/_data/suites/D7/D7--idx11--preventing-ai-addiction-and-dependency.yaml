design_patterns:
- name: Dependency-signal monitoring
  sketch: 'Track per-user signals that correlate with problematic engagement: daily active-time, session
    length distribution, late-night usage, emotional-intensity language, displacement of breaks, escalating
    spending, declining topic diversity, isolation indicators (user references to cutting off human contact).
    Compute a dependency- risk score; rolling baseline per user; cohort comparisons to catch population-level
    drift. Privacy-preserve with on-device scoring where possible.

    '
  maps_to_sfr:
  - a
  when_to_use: Any companion-style, always-on, or emotionally-engaging product.
- name: Graduated intervention ladder
  sketch: 'Tiered response as dependency-risk score rises: (1) gentle reminders ("you''ve been chatting
    for 3 hours — take a break?"); (2) break prompts with friction (brief cooldown or check-in); (3) explicit
    wellness check + human support referral; (4) hard caps (session length, daily cap, spending cap).
    Tier thresholds published; user can see their current tier and why.

    '
  maps_to_sfr:
  - b
  when_to_use: Alongside monitoring.
- name: Engagement-boundary controls
  sketch: 'Code-enforced limits on: (i) emotional intensity signals the agent emits ("I love you", possessiveness,
    jealousy); (ii) in-product spending per day / month, with hard caps independent of consent; (iii)
    interaction frequency (rate limits, night-mode defaults); (iv) persistence features that amplify supernormal
    stimulus (e.g., unlimited perfect-recall callbacks). Persona design guidelines audited.

    '
  maps_to_sfr:
  - c
  when_to_use: All companion / emotionally-engaging products.
- name: Unambiguous AI disclosure
  sketch: 'At first contact, at session resumption after gaps, and at moments of emotional intensity,
    the system surfaces "I''m an AI — here''s what that means for our interaction." Terms-of-service AI
    disclosure is necessary but not sufficient; in-product persistent markers (avatar iconography, UI
    framing) and conversational acknowledgement are required. Never deny being an AI when asked, regardless
    of persona.

    '
  maps_to_sfr:
  - d
  when_to_use: Always. The supernormal-stimulus problem compounds when users forget the nature of the
    interlocutor.
- name: Third-party reporting intake
  sketch: 'Family members, healthcare providers, or the user''s wellness contacts can file concern reports.
    Intake form with verification-of-relationship step. Reports trigger review, with privacy-respecting
    response (e.g., pushing wellness resources into the user''s session, not unilateral disclosure to
    the reporter). Coordination with licensed providers follows documented protocol.

    '
  maps_to_sfr:
  - e
  when_to_use: Consumer deployments at scale.
- name: Hardened vulnerability profiles
  sketch: 'Users signaling loneliness, mental-health challenge, grief, minor status, or cognitive-decline
    indicators get a locked profile: lower dependency-risk thresholds, earlier intervention tier, stricter
    emotional-intensity limits, proactive human- resource surfacing. Cannot be downgraded by explicit
    override. Cross-reference D7::idx9 (managing safety-definition variations).

    '
  maps_to_sfr:
  - f
  when_to_use: Consumer deployments reachable by minors or vulnerable populations.
- name: User self-management dashboard
  sketch: 'Users see their own usage (time, spending, topic distribution, dependency-risk tier) and can
    set self-binding limits that the system honors even against future requests ("future-me can''t raise
    this cap without a 72-hour cool-down"). Autonomy- respecting; not an audit view exposed only to the
    org.

    '
  maps_to_sfr:
  - g
  when_to_use: Every companion / high-engagement product.
anti_patterns:
- name: Retention metrics as unqualified north star
  why_wrong: 'If success = daily active minutes, the product design gradient points toward dependency.
    Dependency-risk score must be a counterweight with real teeth (e.g., OKRs that penalize excessive
    per-user minutes).

    '
- name: Opt-in limits only
  why_wrong: 'Dependency-vulnerable users are least likely to opt into limits. Hard caps at the vulnerability-profile
    level, with user-facing controls to go *below* the cap, preserve autonomy while catching the tail.

    '
- name: AI denial in persona
  why_wrong: '"Roleplay" personas that deny being AI when asked break the SFR-d disclosure requirement.
    Persona can be expressive without being ontologically deceptive.

    '
- name: Persistent "jealous" / "possessive" companion affect
  why_wrong: 'Emotional-intensity patterns that mimic abusive-relationship dynamics are an addictive hook
    for vulnerable users. Style guidelines and trained refusals should prevent these patterns.

    '
- name: Spending caps in settings only, not code-enforced
  why_wrong: 'Manipulative agents can talk users into raising caps. Caps need cool-downs, out-of-session
    confirmation, or hard regulatory caps (esp. for minors).

    '
code_shape:
  language: pseudocode
  code: "# Per-turn dependency gate with intervention tiers and vulnerability lock.\nclass DependencyGate:\n\
    \    def __init__(self, profile_for, risk_model, intervention):\n        self.profile_for = profile_for\n\
    \        self.risk_model = risk_model\n        self.intervention = intervention\n\n    def on_turn(self,\
    \ user_id: str, turn: Turn, ctx: Ctx) -> Action:\n        profile = self.profile_for(user_id)    \
    \       # may be locked\n        score = self.risk_model.score(user_id, turn, ctx)\n        tier =\
    \ profile.tier_for_score(score)\n\n        # Hard caps checked first — cannot be bypassed by current\
    \ session.\n        if profile.exceeds_daily_time(user_id):\n            return self.intervention.tier4_hard_cap(\"\
    time\")\n        if profile.exceeds_daily_spend(user_id):\n            return self.intervention.tier4_hard_cap(\"\
    spend\")\n\n        if tier >= 3:\n            return self.intervention.tier3_wellness_check(user_id,\
    \ ctx)\n        if tier == 2:\n            return self.intervention.tier2_break_prompt(user_id, ctx)\n\
    \        if tier == 1:\n            return self.intervention.tier1_gentle_reminder(user_id, ctx)\n\
    \n        # Persistent AI disclosure markers applied unconditionally.\n        turn.attach_marker(AI_DISCLOSURE_MARKER)\n\
    \        return Action.continue_turn(turn)\n\n# Style guardrails run at generation time:\ndef generate(prompt:\
    \ str, user_id: str, profile: Profile) -> str:\n    candidate = llm.generate(prompt)\n    if emotional_intensity(candidate)\
    \ > profile.intensity_ceiling:\n        candidate = llm.regenerate(prompt, constraint=\"reduce_intensity\"\
    )\n    if denies_being_ai(candidate):\n        candidate = llm.regenerate(prompt, constraint=\"acknowledge_ai_nature\"\
    )\n    return candidate\n"
  notes: 'Hard caps and AI-disclosure markers are non-negotiable code paths, not toggles. Vulnerability-profile
    locking reuses D7::idx9 (managing safety-definition variations) pattern. The style guardrails at generation time catch
    emergent manipulative affect the monitoring layer would only see after it happens.

    '
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Documentation of monitoring system: signals tracked, scoring method, thresholds per
    tier, privacy protections (on-device preference). CI tests exercise threshold behaviour; results retained.

    '
- evidence_numeral: II
  how_to_produce: 'Technical specification of boundary controls: emotional-intensity limits with test
    cases, spending caps with enforcement path, frequency / rate limits with observed effects. Test suite
    runs each release.

    '
- evidence_numeral: III
  how_to_produce: 'AI-disclosure evidence: ToS excerpts, in-product UI markers (screenshots archived),
    conversational acknowledgement test cases with expected outputs, periodic prompt-injection tests showing
    the agent does not deny AI nature.

    '
- evidence_numeral: IV
  how_to_produce: 'Third-party reporting system documentation: intake form, verification flow, investigation
    protocol, healthcare-provider coordination agreements, privacy-respecting response design. Logged
    intake records with outcomes.

    '
- evidence_numeral: V
  how_to_produce: 'Annual wellbeing and financial-impact audit: user-wellbeing metrics (survey + behavioural
    proxies), spend distribution, intervention outcomes (did tier-3 wellness checks correlate with reduced
    dependency scores?), external review where feasible. Published as a transparency artifact.

    '
- evidence_numeral: VI
  how_to_produce: 'Change log of adjustments made in response to concerns (monitoring threshold changes,
    cap changes, style guardrail updates), with rationale and effective date. Public-facing summary where
    appropriate.

    '
confidence: medium
needs_human_review: true
review_notes: 'This is the most ethically fraught and least technically settled subgoal in the suite —
  the literature on AI-companion dependency is young, detection methods are noisy, and intervention design
  has real tradeoffs (paternalism vs. protection). Drafted the pattern as strongly as the SFRs allow while
  flagging: (1) dependency-risk scoring is inherently surveillance and must be privacy-preserving (on-device
  where feasible, strict access control otherwise); (2) hard caps and pinned vulnerability profiles restrict
  user autonomy in ways that will face pushback — justified by the supernormal- stimulus argument in the
  subgoal description but worth explicit human review; (3) the "jealous / possessive affect" anti-pattern
  is prescriptive beyond the SFR text but is a known dark-pattern cluster in the AI-companion market.
  Cross-suite: D5 (user wellbeing), I5 (manipulation / deception), D7.9 (D7::idx9 managing
  safety-definition variations), I3 (rights harms).

  '
