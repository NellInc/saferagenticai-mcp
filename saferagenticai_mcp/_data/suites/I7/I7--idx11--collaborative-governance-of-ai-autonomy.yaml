suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: Collaborative Governance of AI Autonomy
content_type: code-applicable
summary: 'Autonomy is not a binary — an agent operates on a spectrum of permissions, decision authority,
  and reversibility. This subgoal asks for explicit, adjustable autonomy levels with human-in-the-loop
  hooks at scoped decision points, tamper-evident audit trails of autonomy changes, and operational limits
  that cannot be silently widened. The pattern is a "capability-scoped autonomy budget" enforced in code,
  with governance wrappers documenting who can adjust it and when.

  '
