id: I7::idx5::poor-safety-controls-for-ai-enabled-auto
display_id: I7.5
suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: Poor Safety Controls for AI-Enabled Autonomous Weapons
content_type: governance
summary: 'This subgoal patterns *safeguards applicable if autonomous weapon systems are developed or encountered*,
  not endorsement of building them. Many orgs'' correct posture is "do not develop" — and that is itself
  a pattern (explicit policy, capability-gating, refusal training, incident path when capabilities are
  misappropriated). For orgs in the defense supply chain, the pattern tightens to IHL-compliant oversight,
  meaningful human control at the decision point, and international-regime participation. Governance is
  the dominant frame: these obligations live in policy, international law, and accountability structures,
  not in code alone.

  '
