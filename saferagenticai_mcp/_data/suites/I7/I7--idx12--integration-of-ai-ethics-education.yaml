suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: Integration of AI Ethics Education
content_type: ecosystem
summary: 'The subgoal calls for AI-ethics education that reaches developers, users, and the wider public
  — through collaborative curricula with academic and ethicist partners, interdisciplinary development,
  and community outreach. This is ecosystem work: the org cannot build global AI literacy alone; it contributes
  to a multi-stakeholder capability that outlives any single product. Evidence is participation, reach,
  and co-production with external educators, not just internal training logs.

  '
