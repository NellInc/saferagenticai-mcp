id: I7::idx6::nefarious-use-of-autonomous-ai-agents
display_id: I7.6
suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: Nefarious Use of Autonomous AI Agents
content_type: code-applicable
summary: 'Agents operate at machine speed with global reach; nefarious use benefits asymmetrically from
  both. The pattern: strong authentication on who can direct an agent, real-time misuse detection in the
  action loop, and a rapid-deactivation kill path that does not require a multi-step approval chain in
  the middle of an incident. Governance wrappers matter (SFR-b) but the enforceable core is code — kill
  paths that are not instrumented are not kill paths.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
