id: I7::idx3::global-ai-capability-disparities
display_id: I7.3
suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: Global AI Capability Disparities
content_type: ecosystem
summary: 'This subgoal targets the national- and organizational-scale capability gap: developing nations
  and smaller entities have limited access to compute, frontier models, and AI talent. An org cannot solve
  global inequity, but it can either compound or mitigate it through how it prices, licenses, collaborates,
  and participates in cooperation frameworks. Evidence is external — resources actually flowed, partnerships
  actually active, capabilities actually transferred — not internal commitment statements.

  '
