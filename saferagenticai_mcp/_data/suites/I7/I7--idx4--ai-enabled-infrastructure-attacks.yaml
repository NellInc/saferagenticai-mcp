id: I7::idx4::ai-enabled-infrastructure-attacks
display_id: I7.4
suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: AI-Enabled Infrastructure Attacks
content_type: governance
summary: 'This subgoal addresses misuse of AI capability to attack critical infrastructure (power, telecom,
  emergency services, financial systems). The ask is dual: refuse to empower such attacks (policy, capability
  gating, incident response) and participate in collective defense (threat intel sharing, coordinated
  response). Governance is the dominant frame because the obligations are policy-level: binding use policies,
  international agreement posture, critical-infrastructure coordination protocols.

  '
