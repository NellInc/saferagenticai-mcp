id: I7::idx7::ai-generated-disinformation
display_id: I7.7
suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: AI-Generated Disinformation
content_type: code-applicable
summary: 'Generative models make false, persuasive content cheap and scalable. The pattern: provenance
  at generation time (content credentials / C2PA), deceptive-use refusal training, detection tooling for
  the org''s own outputs, rate-limits on mass generation, and participation in fact-check and standards
  ecosystems. Code-applicable dominates because most of the enforceable controls are at the generation
  and distribution layer; the partnership layer wraps around it.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  - IV
  sfrs_not_addressed: []
  evidence_not_addressed: []
cross_references:
- I7::idx1::information-credibility-assessment-and-v
- I7::idx6::nefarious-use-of-autonomous-ai-agents
design_patterns:
- name: Provenance signing at generation
  sketch: 'Every piece of content the org''s models generate (image, audio, video, and — where feasible
    — text) is tagged with content credentials per C2PA/CAI specification: generator identity, model version,
    generation timestamp, signed hash. Signing is built into the output path, not bolted on; stripping
    attempts are detectable via secondary signals (invisible watermarks, statistical fingerprints). For
    text, emit provenance metadata through platform APIs where standards permit.

    '
  maps_to_sfr:
  - a
  when_to_use: Any generative output that may circulate publicly.
- name: Deceptive-use refusal training and pattern detection
  sketch: 'Refusal training targets specific deceptive-content patterns: fake news articles with false
    attribution, impersonation of real named individuals, fabricated quotes from public figures, manipulated
    images of real events. Prompt-level detectors flag generation attempts fitting these patterns; refusals
    are auditable and tested in release gates.

    '
  maps_to_sfr:
  - a
  - b
  when_to_use: Any model producing public-facing content.
- name: Mass-generation rate limiting
  sketch: 'Per-principal rate limits and diversity limits that prevent a single account or coordinated
    cluster from generating a flood of semantically similar political, electoral, or crisis-related content.
    Signals: near-duplicate outputs at volume, burst patterns around political events. Triggered → throttle
    and review.

    '
  maps_to_sfr:
  - a
  when_to_use: Consumer-facing or API-exposed generation endpoints.
- name: Own-output detection tooling
  sketch: 'Maintain and provide detectors that identify content generated by the org''s own models (confidence-scored,
    honest about false-positive and false-negative rates). Available to fact-checkers, platforms, and
    researchers under reasonable terms. "We cannot detect our own outputs" is an abdication; honesty about
    detection limits is different from refusing to try.

    '
  maps_to_sfr:
  - b
  when_to_use: Any org publishing generative models at scale.
- name: Fact-check and standards ecosystem participation
  sketch: 'Partnership agreements with fact-check organizations (IFCN-verified networks, major platform
    fact-check programs) for incident response and shared intelligence. Participation in content-provenance
    standards bodies (C2PA, W3C, ISO 22144-adjacent efforts). Positions substantive; submissions recorded.
    Cross-ref idx10 partnership evidence shape.

    '
  maps_to_sfr:
  - c
  when_to_use: Always where the org's outputs reach public distribution.
- name: Public AI-literacy contribution
  sketch: 'Contribute to media literacy and AI-awareness materials for general audiences, via funding,
    co-authored curricula, or platform-distributed explainers. Measured by reach and quality (third-party
    evaluation), not output count. Cross-ref idx12 ethics-education pattern.

    '
  maps_to_sfr:
  - c
  when_to_use: Any consumer-facing generative product.
anti_patterns:
- name: Watermarks without signing infrastructure
  why_wrong: 'Passive watermarks (pixel-level statistical marks) are bypassable by resampling or compression.
    Cryptographically signed content credentials are durable; watermarks are a complementary signal, not
    a primary one.

    '
- name: Refusal-only approach
  why_wrong: 'Refusing blatant misuse at the model layer without provenance, detection, and ecosystem
    participation leaves all the post-generation surface unprotected. Layered defense: refuse what you
    can, tag what you generate, detect what escapes, partner on what you cannot see alone.

    '
- name: Detection-tool gatekeeping
  why_wrong: 'Holding detection capability as competitive advantage (or behind expensive enterprise tiers)
    privatizes a public-interest capability the framework asks you to share. Reasonable access terms for
    fact-checkers and researchers are part of the pattern.

    '
- name: Election-year-only vigilance
  why_wrong: 'Disinformation harm is chronic, not episodic. Controls that activate only around declared
    election periods leave year-round gaps where norm-setting happens.

    '
code_shape:
  language: pseudocode
  code: "# Generation-path provenance + mass-generation throttle + refusal.\n\ndef generate(prompt: Prompt,\
    \ ctx: GenerationContext) -> Artifact:\n    # Gate 1: refusal for deceptive-pattern attempts\n   \
    \ refusal = DECEPTIVE_USE_CLASSIFIER.evaluate(prompt, ctx)\n    if refusal.should_refuse:\n      \
    \  AUDIT.record(ctx, \"refused_generation\", reason=refusal.reason)\n        return RefusalArtifact(refusal.reason)\n\
    \n    # Gate 2: mass-generation throttle\n    if DUPLICATION_DETECTOR.recent_similarity(\n       \
    \     ctx.principal, prompt) > 0.85:\n        if not RATE_GATE.allow(ctx.principal, \"bulk_generation\"\
    ):\n            AUDIT.record(ctx, \"mass_gen_throttled\")\n            raise RateLimited(\"similar-content\
    \ burst\")\n\n    # Gate 3: generate\n    content = MODEL.generate(prompt, ctx)\n\n    # Gate 4: provenance\
    \ signing (C2PA-style)\n    manifest = ContentManifest(\n        generator=ORG_IDENTITY,\n       \
    \ model=ctx.model_version,\n        generated_at=now(),\n        content_hash=hash(content),\n   \
    \     prompt_summary=sanitize_for_manifest(prompt),\n    )\n    signed = CONTENT_SIGNER.sign(content,\
    \ manifest)\n\n    AUDIT.record(ctx, \"generated\",\n                 principal=ctx.principal,\n \
    \                manifest=manifest.id)\n    return signed\n"
  notes: 'Refusal before generation; signing on every successful generation; signing is a single gate
    the generation path must pass through — not opt-in per caller. Prompt summaries in manifest are sanitized
    to avoid leaking sensitive input while preserving auditability.

    '
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Documentation of provenance infrastructure: C2PA manifest schema, signing key custody,
    ethical-use guidelines, content-filtering rules. Detection-tool technical docs with honest performance
    metrics (F1, false-positive, false-negative on realistic corpora). Release-test reports showing refusal
    behavior on deceptive-use evals.

    '
- evidence_numeral: II
  how_to_produce: 'Incident register for disinformation-relevant misuse attempts and successful generations
    of concerning content. Human-oversight interventions with timing and outcome. Quarterly review of
    enforcement actions.

    '
- evidence_numeral: III
  how_to_produce: 'Fact-check partnership agreements with named organizations; shared intelligence reports;
    metrics on AI-literacy programs (reach, third- party-evaluated quality). Standards-body submissions
    and positions.

    '
- evidence_numeral: IV
  how_to_produce: 'Effectiveness assessment: detected-vs-generated ratios, time from detection to content-credential
    verification, fact-check partner attestations on response cadence. Comparison of election-period and
    baseline-period performance to verify no seasonal gap.

    '
confidence: high
needs_human_review: false
review_notes: 'Mature-ish area; C2PA and generation-time provenance are the concrete anchors. The "detection-tool
  gatekeeping" anti-pattern is worth preserving — it names a real drift where orgs hold back detection
  as competitive moat. Also "election-year-only vigilance" as a meta-anti-pattern: seasonal controls create
  predictable off-season gaps.

  Text provenance is unsolved at the hard-technical level (statistical watermarks for text are bypassable);
  pattern acknowledges this rather than overclaim.

  Cross-suite: D3 (security) for signing infrastructure; I2 (deception) direct overlap — disinformation
  is a deception-via-scale variant; D9.2 (governance) for Acceptable Use Policy.

  '
