stakeholders:
- name: Alliance governance bodies (where the org holds seats)
  engagement_channel: 'Advocate for governance structures in AI alliances that guarantee voting weight and chair
    rotation to developing-nation and smaller- entity members — not advisory seats without decision authority.
    In practice: support GPAI expert-selection reforms, UN AI Advisory Body follow-on structures, regional-body
    inclusion in global forums (African Union, ASEAN, Latin American caucuses). Document positions taken;
    abstain from or dissent to structures that concentrate decision authority.

    '
  maps_to_sfr:
  - a
- name: Meaningful-participation partnerships
  engagement_channel: 'Co-owned partnerships where developing-nation partners hold project leadership, IP stakes,
    publication first-authorship where earned, and revenue sharing where commercialization occurs. Not
    sub-contract relationships. Pattern: at least one co-led flagship per major research area; governance
    terms published.

    '
  maps_to_sfr:
  - a
  - b
- name: Anti-exploitation oversight mechanism
  engagement_channel: 'Independent review function (ombudsperson-style, or external panel) with authority to investigate
    claims of exploitative practice in the org''s partnerships — data extraction dressed as collaboration,
    IP capture, unequal contract terms, labor arbitrage for training data work. Complainants protected;
    findings published in aggregate; remedies enforceable. Cross-ref D9.2 dispute resolution shape.

    '
  maps_to_sfr:
  - b
- name: Global research and education investment
  engagement_channel: 'Sustained, multi-year (not annual-gift) funding commitments for AI research capacity in under-served
    regions: endowed fellowships, infrastructure co-funding (compute, data centers with local governance),
    curriculum co-development with local institutions. Commitments survive funder personnel change; funding
    contracts reviewed by a recipient-side panel as well as the org''s finance function.

    '
  maps_to_sfr:
  - c
- name: Benefit-sharing accountability
  engagement_channel: 'Publish an annual "who benefited" report covering partnerships and capability-sharing initiatives:
    how resources were distributed, which populations gained capability, where the org profited from partnership
    activity. Third-party audit of the report by an entity with credibility in the receiving regions.
    The spirit of the framework requires public answerability beyond the org''s home audience.

    '
  maps_to_sfr:
  - b
  - c
engagement_modes:
- mode: UN AI Advisory Body and its successor mechanisms
- mode: Global Digital Compact implementation tracks
- mode: GPAI (Global Partnership on AI) expert and governance reforms
- mode: UNESCO Ethics of AI implementation monitoring
- mode: 'Regional AI governance bodies (AU Continental AI Strategy, ASEAN Guide on AI Governance, CAF regional AI strategies, PIF digital tracks)'
- mode: 'Multilateral development bank AI capacity programs (World Bank, AfDB, ADB, IADB, EBRD)'
- mode: 'Bilateral science-diplomacy programs where the org''s home government funds international AI cooperation'
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Partnership documentation including governance terms (voting, IP, leadership), resources
    flowing in each direction, outputs (publications, deployed systems, trained researchers). Published
    externally; co-signed by partner organizations.

    '
- evidence_numeral: II
  how_to_produce: 'Oversight records: ombudsperson or external-panel charter, complaints received, investigations
    completed, findings, remedies applied. Publication in aggregate form; individual cases handled per
    complainant consent.

    '
- evidence_numeral: III
  how_to_produce: 'Educational and research-collaboration documentation: curricula co-developed, joint-project
    outcomes, fellowship recipients (with outcomes beyond the fellowship year), infrastructure deployed
    with local governance.

    '
- evidence_numeral: IV
  how_to_produce: 'Independent annual assessment: "who benefited" report with third-party audit, trend
    metrics showing whether capability gap narrowed or widened in the org''s sphere of influence, dissenting
    stakeholder views preserved rather than smoothed into consensus.

    '
confidence: medium
