review_notes: "Content-type pick tension: this is the suite umbrella and genuinely spans three content\
  \ types. SFR-a (transparent info-sharing AMONG PROVIDERS, coordinated releases) is ecosystem. SFRs b,\
  \ d, e, g are internal monitoring (code/process). SFR-a dominates the severity of the under-addressed\
  \ risk, so I picked ecosystem; a process-typed draft would be equally defensible. Phase 2 may want to\
  \ split this umbrella into distinct ecosystem + process patterns referenced from a thin index entry.\n\
  The \"30 days advance notice for capability-tier jumps\" is a concrete anchor but not a standard — Frontier\
  \ Model Forum does not yet commit to this publicly. Treat as aspirational pattern; Nell/Ali should decide\
  \ whether to soften to \"defined notice window in forum charter\" or hold the concrete number as a target.\n\
  Cross-suite dependencies worth flagging for consolidation:\n  - I2 (Deception): inter-model manipulation\
  \ is this suite's framing of\n    the same adversarial surface. Link when I2 pattern_ids exist.\n  -\
  \ I4 (Frontier Uncertainty): capability-tier evals assume a shared\n    notion of \"tier\" that I4 problematizes.\n\
  \  - D9.2: accountability framework for the monitoring function.\n  - D7.2: capability ledger and pre-deployment\
  \ review.\n\nSFR-h (\"allocate sufficient resources\") is a budget statement, not a capability — I've\
  \ patterned it as a budget-line/named-staff evidence item; a governance-typed draft might pattern it\
  \ as a board attestation.\n"
