suite_id: I7
suite_title: Imbalance in AI Capabilities
subgoal_title: Imbalance in AI Capabilities
content_type: ecosystem
summary: 'The umbrella subgoal for I7. It names a cross-provider problem: more advanced models can manipulate
  or exploit less capable ones, and uncoordinated capability jumps destabilize the ecosystem. The core
  obligation is cross-org coordination — transparent change notification, capability tracking, and shared
  detection of inter-model exploitation. Internal monitoring matters, but it is necessary-not-sufficient:
  a provider that surveils only its own models cannot see the imbalance it is creating.

  '
