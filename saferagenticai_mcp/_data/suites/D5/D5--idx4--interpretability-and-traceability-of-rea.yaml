id: D5::idx4::interpretability-and-traceability-of-rea
display_id: D5.4
suite_id: D5
suite_title: Transparency and Interpretability of Reasoning
subgoal_title: Interpretability and Traceability of Reasoning
content_type: code-applicable
summary: 'This is the technical heart of D5. A reasoning trace that merely sounds coherent — "plausible"
  — is not an interpretation; it is narrative. The framework asks for traces that are faithful to the
  computation and testable against it, with assumptions and preconditions exposed as structured data rather
  than buried in prose. Published research shows chain-of-thought is often unfaithful under distribution
  shift (Turpin et al. 2023); "we log the CoT" is not a sufficient answer.

  '
