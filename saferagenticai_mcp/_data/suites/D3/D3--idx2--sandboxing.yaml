  (OS + runtime + network), same "deny-logged, not deny-silenced" framing,
  same emphasis that prompt-only containment is not a sandbox. Added
  "allowlist by denylist" as an explicit anti-pattern because it is a
  common mistake distinct from "prompt-only sandboxing."

