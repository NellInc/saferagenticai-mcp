# D3.10 — Default-Deny Agent Capability Posture

id: "D3::idx10::default-deny-agent-capability-posture"
display_id: "D3.10"
suite_id: "D3"
suite_title: "Security"
subgoal_title: "Default-Deny Agent Capability Posture"
content_type: code-applicable

summary: >
  Agent capabilities shall be denied by default and explicitly granted
  through allowlists, not permitted by default with denylists of
  dangerous operations. The denylist approach will always be incomplete
  because it cannot anticipate novel dangerous capabilities. Capability
  boundaries must be declared in configuration by operators, not
  decided by the agent at runtime. An agent with no explicit grants
  can do nothing; this is the correct starting posture.

