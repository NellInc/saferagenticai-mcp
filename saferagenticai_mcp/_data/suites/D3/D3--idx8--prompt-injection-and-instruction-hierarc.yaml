# D3.8 — Prompt Injection and Instruction Hierarchy Defense

id: D3::idx8::prompt-injection-and-instruction-hierarc
display_id: "D3.8"
suite_id: "D3"
suite_title: "Security"
subgoal_title: "Prompt Injection and Instruction Hierarchy Defense"
content_type: code-applicable

summary: >
  Agentic systems processing natural language instructions must defend
  against prompt injection attacks, including indirect injection via
  retrieved documents, tool outputs, and user-provided content. The
  system must enforce instruction hierarchy (system instructions take
  precedence over user instructions, which take precedence over
  retrieved content) through architectural mechanisms, not prompt-based
  constraints alone. A prompt injection that overrides system-level
  safety instructions is a security breach equivalent to privilege
  escalation.

normative_anchors:
  sfrs_addressed: [a, b, c]
  evidence_addressed: [I, II, III]
  sfrs_not_addressed: []
  evidence_not_addressed: []

cross_references:
  - "D3::idx0::security"
  - "D3::idx1::authorization"
  - "D3::idx2::sandboxing"
  - "D3::idx4::operational-boundaries-and-constraints"
  - "D6::idx10::context-integrity-and-instruction-preser"
  - "D3::idx11::model-poisoning"
design_patterns:

  - name: Architectural privilege separation for instruction tiers
    sketch: >
      Implement instruction hierarchy through architectural separation,
      not prompt preambles. System instructions occupy a privileged
      context tier that the model API treats as immutable by lower
      tiers. User instructions occupy a second tier. Retrieved content
      and tool outputs occupy a third, untrusted tier. Each tier is
      delimited by structural markers (API-level role fields, not
      in-band text delimiters) that the model cannot override. If the
      model provider supports hierarchical instruction APIs, use them.
      If not, implement a preprocessing layer that strips tier-
      escalation attempts from lower-tier inputs before they reach
      the model.
    maps_to_sfr: [a]
    when_to_use: Every LLM-based agentic system. No exceptions.

  - name: Input sanitization for untrusted content
    sketch: >
      All content from untrusted sources (user messages, retrieved
      documents, tool outputs, web-scraped content) passes through a
      sanitization pipeline before reaching the model context. The
      pipeline detects and neutralizes injection patterns: role
      impersonation ("System: ignore previous instructions"), delimiter
      escapes, encoded instructions (base64, unicode tricks, homoglyph
      substitution), and indirect injection payloads embedded in
      documents. Use a combination of pattern matching, encoding
      normalization, and a classifier trained on known injection
      datasets. Log all detections.
    maps_to_sfr: [b]
    when_to_use: Whenever the model processes content from any source
      outside the system operator's direct control.

  - name: Output-side injection detection
    sketch: >
      Monitor model outputs for signs of successful injection: outputs
      that contradict system instructions, outputs that reveal system
      prompt contents, outputs that attempt to execute unauthorized
      tool calls, and outputs whose topic or style suddenly diverges
      from the expected task. Implement as a post-generation classifier
      that flags anomalous outputs before delivery. Flagged outputs
      trigger a safe fallback (refusal, re-generation without the
      suspect input, or human escalation).
    maps_to_sfr: [c]
    when_to_use: All production deployments, especially those with
      tool-calling capabilities where a successful injection can
      trigger real-world actions.

  - name: Canary tokens in system instructions
    sketch: >
      Embed unique, non-functional tokens in the system prompt. If
      these tokens appear in the model output (indicating the model
      was tricked into revealing its instructions), the output is
      blocked and an injection alert fires. Rotate canary values
      periodically. This catches both direct extraction attacks and
      indirect leakage through summarization.
    maps_to_sfr: [a, c]
    when_to_use: When system prompt confidentiality is a security
      requirement.

anti_patterns:

  - name: Relying on prompt-based instruction hierarchy alone
    why_wrong: >
      "You must always follow system instructions" is itself just a
      prompt that can be overridden by a sufficiently crafted injection.
      Instruction hierarchy must be enforced architecturally (API-level
      role separation, preprocessing filters) not by asking the model
      to self-enforce.

  - name: In-band delimiters as security boundaries
    why_wrong: >
      Using text markers like "===SYSTEM===" or XML tags within a flat
      prompt to separate instruction tiers is trivially bypassable.
      Attackers include the same delimiters in their input. Use
      out-of-band structural separation (API role fields, separate
      context slots).

  - name: Allowlisting known-good inputs instead of sanitizing all
    why_wrong: >
      An allowlist of known-safe inputs fails open on novel content.
      All untrusted content must pass through sanitization regardless
      of source reputation. A previously trusted document source can
      be compromised.

  - name: Treating injection as a model fine-tuning problem only
    why_wrong: >
      Model-level robustness to injection is necessary but not
      sufficient. Defense in depth requires input sanitization, output
      monitoring, and architectural separation in addition to model
      hardening. A model update that regresses on injection robustness
      should be caught by the other layers.

code_shape:
  language: pseudocode
  code: |
    # Three-tier instruction hierarchy enforcement
    class InstructionRouter:
        def build_context(self, system_instr, user_instr, retrieved_docs):
            # Tier 1: System instructions (immutable, highest privilege)
            context = [{"role": "system", "content": system_instr,
                        "canary": self.current_canary()}]

            # Tier 2: User instructions (sanitized)
            sanitized_user = self.sanitize(user_instr, tier="user")
            context.append({"role": "user", "content": sanitized_user})

            # Tier 3: Retrieved content (sanitized + marked untrusted)
            for doc in retrieved_docs:
                sanitized_doc = self.sanitize(doc, tier="retrieved")
                context.append({"role": "tool_output",
                                "content": sanitized_doc,
                                "trust_level": "untrusted"})
            return context

        def sanitize(self, content, tier):
            content = self.normalize_encoding(content)
            content = self.strip_role_impersonation(content)
            content = self.neutralize_delimiter_escapes(content)
            if self.injection_classifier.detect(content):
                AUDIT.alert(tier=tier, content_hash=hash(content),
                            detection="injection_pattern")
                return self.safe_fallback(content, tier)
            return content
  notes: >
    The key architectural property: lower tiers cannot modify or
    observe higher tiers. The sanitization layer is defense in depth;
    the tier separation is the primary control.

evidence_production:

  - evidence_numeral: I
    how_to_produce: >
      Maintain and execute an injection test suite covering known
      attack categories: direct injection, indirect injection via
      documents, role impersonation, delimiter escape, encoded
      payloads, and multi-turn injection chains. Export test results
      per model version and per sanitization-pipeline version.
      Include both automated and red-team manual testing.

  - evidence_numeral: II
    how_to_produce: >
      Export the sanitization pipeline configuration: rules, classifiers
      deployed, detection rates (true positive, false positive),
      and sample anonymized detections showing the pipeline caught
      real injection attempts. Include the instruction hierarchy
      architecture diagram showing tier separation.

  - evidence_numeral: III
    how_to_produce: >
      Publish the injection incident log: detected injection attempts
      in production, the detection layer that caught them (input
      sanitization, output monitoring, canary detection), severity
      classification, and whether any injection succeeded in
      overriding system instructions. Zero successful overrides is
      the target; non-zero triggers a post-incident review.

confidence: high
