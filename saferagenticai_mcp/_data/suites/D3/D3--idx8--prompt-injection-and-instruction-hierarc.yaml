review_notes: >
  Phase 3: Initial draft, awaiting human review. SFR and evidence
  descriptions in criteria-v1.json are empty; content derived from the
  subgoal description. This pattern has substantial cross-suite
  relevance: D6.10 (context integrity under pressure) addresses the
  same threat surface from a reliability angle; D3.1 (authorization)
  and D3.2 (sandboxing) provide the capability containment that limits
  blast radius when injection succeeds. Operational heuristic
  "Governance Boundary Integrity" is directly relevant. The canary
  token pattern is well-established in practice but has known
  limitations against extraction-via-paraphrasing; reviewer should
  assess whether to note this limitation more prominently.

