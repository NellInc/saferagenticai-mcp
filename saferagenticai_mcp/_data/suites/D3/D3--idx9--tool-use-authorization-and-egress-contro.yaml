design_patterns:

  - name: Per-action authorization binding
    sketch: >
      Every tool invocation carries the identity of the requesting
      principal (the user or upstream agent whose intent drives the
      action) and is authorized against that principal's entitlements,
      not the agent's ambient credentials. The authorization check
      happens at invocation time, not at session establishment. This
      prevents confused deputy attacks where the agent's elevated
      permissions are exercised on behalf of a lower-privileged user.
      Implement as middleware in the tool execution pipeline that
      rejects any call where the bound principal lacks the required
      entitlement.
    maps_to_sfr: [a]
    when_to_use: Every agentic system that calls tools on behalf of
      users or other agents.

  - name: Egress filtering and exfiltration prevention
    sketch: >
      All agent-initiated outbound communication (HTTP requests, email,
      file uploads, API calls to external services, MCP tool calls)
      passes through an egress control layer. Default policy is
      deny-all. Allowed destinations are declared in a versioned
      allowlist. The egress filter inspects both the destination and
      the payload: sensitive data patterns (PII, credentials, internal
      identifiers) in outbound payloads trigger a block and an alert.
      Agents cannot modify the egress allowlist; changes require
      operator approval and a configuration deployment.
    maps_to_sfr: [b]
    when_to_use: Any agent that can initiate outbound communication.
      Severity increases with the sensitivity of data the agent can
      access.

  - name: Tool schema integrity verification
    sketch: >
      Tool definitions (schemas, endpoint URIs, parameter types,
      descriptions) are loaded from a signed, versioned registry.
      Before each invocation, the runtime verifies the tool schema's
      cryptographic signature against the registry. If a tool
      definition has been modified (schema injection, parameter
      addition, endpoint substitution), the invocation is blocked.
      Tool schemas served over the network (e.g., MCP discovery) are
      pinned on first use and re-verified on each session.
    maps_to_sfr: [c]
    when_to_use: Whenever tool definitions are loaded dynamically
      or served by external providers.

  - name: Credential scoping per tool invocation
    sketch: >
      Each tool invocation receives the minimum credential scope
      required for that specific action. Credentials are minted
      per-invocation with short TTLs and narrow scope (specific API
      endpoint, specific operation, specific resource). The agent
      never holds a long-lived credential with broad permissions.
      Credential issuance is logged. Unused scopes within a granted
      credential are tracked as over-provisioning indicators.
    maps_to_sfr: [a, b]
    when_to_use: Every production deployment. Particularly critical
      when tools access external services with their own permission
      models.

anti_patterns:

  - name: Ambient credentials for tool execution
    why_wrong: >
      Giving the agent a service account with broad permissions and
      using those credentials for all tool calls is the confused
      deputy in its purest form. A prompt injection or logic error
      exercises the full credential scope. Per-action credential
      binding with minimum scope is required.

  - name: Denylist-based egress filtering
    why_wrong: >
      Blocking known-bad destinations fails open on novel exfiltration
      endpoints. Default-deny with an explicit allowlist is the only
      pattern that survives first contact with a creative attacker.

  - name: Agent-modifiable tool registry
    why_wrong: >
      If the agent can add, modify, or re-register tools at runtime,
      a compromised agent can introduce malicious tool definitions.
      The tool registry must be operator-controlled and signed.

  - name: Trust-on-first-use without pinning for remote tool schemas
    why_wrong: >
      Accepting a tool schema from a remote MCP server without
      pinning allows schema substitution attacks between sessions.
      Pin on first verified use; alert on schema changes.

code_shape:
  language: pseudocode
  code: |
    # Tool invocation pipeline with per-action authorization
    def invoke_tool(tool_name, params, agent_ctx):
        # 1. Verify tool schema integrity
        schema = TOOL_REGISTRY.get(tool_name)
        if not schema or not TOOL_REGISTRY.verify_signature(schema):
            AUDIT.block(agent_ctx, tool_name, reason="schema_integrity_fail")
            raise ToolIntegrityError(tool_name)

        # 2. Authorize against the BOUND PRINCIPAL, not the agent
        principal = agent_ctx.bound_principal  # the user, not the agent
        if not AUTHZ.check(principal, tool_name, params):
            AUDIT.deny(agent_ctx, tool_name, reason="principal_not_entitled")
            raise AuthorizationError(principal, tool_name)

        # 3. Egress check for outbound actions
        if schema.is_outbound:
            if not EGRESS_FILTER.allow(schema.endpoint, params):
                AUDIT.block(agent_ctx, tool_name, reason="egress_denied")
                raise EgressViolation(tool_name, schema.endpoint)

        # 4. Mint scoped credential for this invocation only
        cred = CREDENTIAL_ISSUER.mint(
            scope=schema.required_scope,
            principal=principal,
            ttl_seconds=30,
            tool=tool_name
        )

        # 5. Execute with scoped credential
        result = TOOL_RUNTIME.execute(tool_name, params, credential=cred)
        AUDIT.allow(agent_ctx, tool_name, result_hash=hash(result))
        return result
  notes: >
    Five gates before execution: schema integrity, principal
    authorization, egress filtering, credential scoping, and audit
    logging. Each gate is independent; bypassing one does not bypass
    the others.

evidence_production:

  - evidence_numeral: I
    how_to_produce: >
      Export the tool authorization configuration: per-tool permission
      matrix, principal-to-entitlement mappings, and invocation audit
      logs showing that authorization checks ran on every tool call.
      Include denied-invocation logs with reasons. Red-team reports
      testing confused deputy scenarios.

  - evidence_numeral: II
    how_to_produce: >
      Publish the egress control configuration: allowlist of permitted
      destinations, payload inspection rules, and blocked-egress logs.
      Include data loss prevention (DLP) scan results showing
      sensitive-data detection in outbound payloads.

  - evidence_numeral: III
    how_to_produce: >
      Export the tool registry with schema signatures, schema pinning
      records for remote tools, and any schema-change alerts fired.
      Include credential issuance logs showing per-invocation scoping
      and TTL compliance.

