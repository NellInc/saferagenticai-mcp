# D3.9 — Tool-Use Authorization and Egress Control

id: D3::idx9::tool-use-authorization-and-egress-contro
display_id: "D3.9"
suite_id: "D3"
suite_title: "Security"
subgoal_title: "Tool-Use Authorization and Egress Control"
content_type: code-applicable

summary: >
  Agentic systems with tool-calling capabilities must implement
  per-action authorization binding, egress controls on agent-initiated
  communications, and integrity verification for tool definitions. The
  system must not use elevated credentials on behalf of lower-privileged
  principals (confused deputy prevention), and tool schemas must be
  verified against tampering. Every tool invocation is a capability
  exercise that requires explicit authorization, not a default privilege.

normative_anchors:
  sfrs_addressed: [a, b, c]
  evidence_addressed: [I, II, III]
  sfrs_not_addressed: []
  evidence_not_addressed: []

