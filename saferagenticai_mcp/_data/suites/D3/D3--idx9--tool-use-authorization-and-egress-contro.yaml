  Phase 3: Initial draft, awaiting human review. SFR and evidence
  descriptions in criteria-v1.json are empty; content derived from the
  subgoal description. Strong overlap with D3.10 (default-deny
  capability posture): this pattern addresses the authorization and
  egress mechanism; D3.10 addresses the philosophical posture that
  capabilities are denied by default. Together they form a coherent
  pair. Operational heuristics "Trust Zone Architecture" and "Bounded
  Information Gathering" are directly relevant. The confused deputy
  framing is well-established in security literature; the MCP/tool-use
  application is newer and less battle-tested.

