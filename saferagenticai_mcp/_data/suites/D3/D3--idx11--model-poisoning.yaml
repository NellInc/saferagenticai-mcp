# D3.1 (underlined variant) — Model Poisoning
# Note: display_id "D3.1" collides with the non-underlined "D3.1 Authorization"
# (idx1). These are distinct subgoals; use full `id` to disambiguate.

id: D3::idx11::model-poisoning
display_id: "D3_1"
is_underlined_variant: true
suite_id: "D3"
suite_title: "Security"
subgoal_title: "Model Poisoning"
content_type: code-applicable

summary: >
  Model poisoning is corruption of model behaviour through tainted training
  data, compromised updates, malicious fine-tuning, or adversarial retrieval
  content. In agentic systems the attack surface widens because live data
  (RAG corpora, tool outputs) becomes input to future reasoning. This subgoal
  expects defences *before* training/update (data provenance, filtering)
  *during* live retrieval (source validation, prompt-injection defence) and
  *across* ensembles (no single corrupted model can dominate).

normative_anchors:
  sfrs_addressed: [a, b, c]
  evidence_addressed: [I, II, III]
  sfrs_not_addressed: []
  evidence_not_addressed: []

