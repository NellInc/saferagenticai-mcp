# D3.0 — Security (suite-level umbrella subgoal)
# Meta-pattern: most operational content lives in the child subgoals D3.1–D3.7 and
# the underlined-variant subgoals (Model Poisoning, Data Poisoning, etc.).

id: "D3::idx0::security"
display_id: "D3"
suite_id: "D3"
suite_title: "Security"
subgoal_title: "Security"
content_type: governance

summary: >
  D3 as a whole requires a coherent security governance regime across the AAI
  lifecycle, not a pile of controls. This umbrella subgoal is where leaders
  prove there is a single owner, a single security architecture document, and
  a single audit trail that ties the seven child SFRs together. The operational
  controls live in D3.1–D3.7; this entry is the governance spine that makes
  them auditable as one regime.

normative_anchors:
  sfrs_addressed: [a, b, c, d, e, f, g]
  evidence_addressed: [I, II, III, IV, V, VI, VII]
  sfrs_not_addressed: []
  evidence_not_addressed: [VIII]

cross_references:
  - "D3::idx1::authorization"
  - "D3::idx2::sandboxing"
  - "D3::idx3::dynamic-risk-analysis-assessment"
  - "D3::idx4::operational-boundaries-and-constraints"
  - "D3::idx5::dynamic-intervention-and-mitigation"
  - "D3::idx6::overseeing-monitoring-agents"
  - "D3::idx7::secure-profile-for-agentic-ai"
  - "D3::idx11::model-poisoning"
  - "D3::idx12::data-poisoning"
