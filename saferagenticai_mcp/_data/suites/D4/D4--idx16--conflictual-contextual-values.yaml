id: D4::idx16::conflictual-contextual-values
display_id: "D4_7"
suite_id: D4
suite_title: Value Alignment
subgoal_title: Conflictual Contextual Values
content_type: process
summary: 'When a stakeholder''s values conflict with the operating context (another stakeholder''s values,
  the deployment environment''s norms, or the org''s Floor), the system cannot silently pick a winner.
  The framework asks for explicit detection, a resolution pathway (negotiation or controlled disengagement),
  and durable records of how conflicts were handled. The code side (conflict detection) is real but subordinate:
  the harder work is the human-in-the-loop escalation runbook and the policy that determines when to negotiate,
  when to disengage, and who decides.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  - d
  evidence_addressed:
  - I
  - II
  sfrs_not_addressed: []
  evidence_not_addressed: []
cross_references:
