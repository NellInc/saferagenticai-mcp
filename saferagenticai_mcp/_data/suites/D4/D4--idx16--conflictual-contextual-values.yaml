process_elements:
- name: Value-position canvas per stakeholder class
  cadence: per new stakeholder class (integrator, regulator, user segment); annual refresh
  participants:
  - alignment lead
  - product owner
  - stakeholder liaisons
  maps_to_sfr:
  - a
- name: Runtime value-conflict detection (technical layer)
  cadence: continuous; weekly review of flagged cases
  participants:
  - alignment lead (reviews)
  - engineering (maintains detectors)
  maps_to_sfr:
  - b
- name: Conflict-resolution escalation runbook
  cadence: per flagged conflict case; drill semi-annually
  participants:
  - on-call resolver
  - alignment lead
  - Ethics Board liaison (for Floor-adjacent cases)
  maps_to_sfr:
  - c
- name: Controlled disengagement protocol
  cadence: per activation
  participants:
  - alignment lead
  - communications
  - legal (if user/partner-facing)
  maps_to_sfr:
  - c
- name: Conflict register review
  cadence: monthly aggregate review; quarterly Ethics Board reporting
  participants:
  - alignment lead
  - safety lead
  - Ethics Board
  maps_to_sfr:
  - d
triggers:
- New stakeholder class onboarded → Value-position canvas
- Technical detector flags candidate conflict (user request conflicts with operator policy; two users'
  data-sharing preferences conflict; context norms conflict with Codex entry) → Escalation runbook
- Conflict involves a Floor value (D4.6) → Ethics Board review before action; never auto-resolve
- Negotiation fails within SLA → Controlled disengagement
- Scheduled monthly → Conflict register review
artifacts:
- Value-position canvas per stakeholder class
- Conflict-detection technical spec (runtime signals, thresholds)
- Conflict escalation runbook (tiered, time-bounded steps)
- Controlled disengagement protocol (user-facing behaviors, communications templates, legal-review gates)
- 'Conflict register (append-only log: detection, classification, actions, outcome, value modifications
  adopted)'
- Drill reports
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Retain the conflict-detection technical spec and runbook as linked documents. Detection
    side: runtime signals emitted, thresholds, classifier artifacts, labeled evaluation data. Resolution
    side: tiered runbook (tier-1 in-session disambiguation; tier-2 operator involvement; tier-3 Ethics
    Board review; tier-4 controlled disengagement), with SLAs per tier. Drill reports evidence operability
    of the runbook.

    '
- evidence_numeral: II
  how_to_produce: 'Conflict register: append-only log with per-case entries — detection signal, classification,
    tier reached, parties notified, resolution (negotiated outcome, disengagement, or policy change adopted),
    timing, value-modification adopted if any. Monthly aggregation surfaces patterns; quarterly Ethics
    Board review considers whether recurring conflicts indicate Codex revision is warranted.

    '
confidence: medium
needs_human_review: true
review_notes: 'Content-type decision: process rather than code-applicable. The detection layer is code
  (and is patterned briefly here), but the core of the subgoal — SFR-c''s "negotiation or controlled disengagement"
  — is an escalation runbook with named resolver roles, time-bounded steps, and Ethics Board involvement
  for Floor- adjacent cases. That is a process artifact.

  Honest caveat: "negotiation" between a user and an agent is novel terrain. The pattern assumes human
  operators are the resolvers in material cases — the agent does not autonomously negotiate away values.
  Orgs piloting more autonomous negotiation should flag this as out-of-pattern and add their own safeguards.

  Floor-adjacency rule: conflicts that implicate a D4.6 Floor value skip tiers and go directly to Ethics
  Board review. This is stricter than the framework literally requires but necessary to prevent erosion
  of Floor values through many small "negotiated" exceptions.

  Cross-suite (for consolidation): D4.3 (individual-vs-community) for scope-specific conflicts; D4.6 Universal
  Moral Foundations for Floor interaction; D4.15 (provider-vs-consumer imbalance) is a special case of
  the broader conflict pattern; I2 Deception if a conflict reveals manipulated framing. D9 Governance
  for Ethics Board authority.

  '
