id: D4::idx11::non-transparent-value-framework
display_id: "D4_2"
suite_id: D4
suite_title: Value Alignment
subgoal_title: Non-transparent Value Framework
content_type: governance
summary: 'A value framework is transparent only if each named audience — developers, integrators, end
  users, auditors, regulators, legal counsel — can access an accurate representation at their level of
  abstraction, and all representations trace back to a single source of truth. This subgoal is governance-shaped
  because it calls for a multi-audience documentation architecture with verification cadences and named
  ownership, not a single piece of code. The fail mode is producing a glossy public-facing statement that
  no longer matches the operational encoding.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  sfrs_not_addressed: []
  evidence_not_addressed: []
cross_references:
