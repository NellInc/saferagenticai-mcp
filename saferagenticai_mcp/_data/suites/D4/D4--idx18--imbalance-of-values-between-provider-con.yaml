id: D4::idx18::imbalance-of-values-between-provider-con
display_id: "D4_9"
suite_id: D4
suite_title: Value Alignment
subgoal_title: Imbalance of Values between Provider & Consumer
content_type: governance
summary: 'Every deployed agent carries both provider values (what the organization will not do regardless
  of request) and user values (what the user wants the agent to do on their behalf). Left implicit, provider
  values tend to creep — expanding to cover commercial preferences, not only non-negotiable commitments
  — and user values tend to be overridden without disclosure. This subgoal is a governance artifact: name
  the non-negotiable provider values publicly, document the balancing policy, establish detection of excessive
  imbalance, and commit to a transparency cadence that the provider cannot quietly drift out of.

  '
normative_anchors:
  sfrs_addressed:
