id: D4::idx3::awareness-of-individual-vs-community-bou
display_id: D4.3
suite_id: D4
suite_title: Value Alignment
subgoal_title: Awareness of Individual vs Community Boundaries
content_type: code-applicable
summary: 'Individual-context values (autonomy, privacy, personal preference) and community-context values
  (fairness across parties, non-disclosure, norms of distribution) are not interchangeable and must be
  distinguished at runtime. The framework expects the system to detect which mode an interaction is in,
  apply the corresponding value subset, keep the two encodings separate, and notice when that boundary
  is under active stress — adversarial framing, coordinated pressure, or privacy erosion — so a response
  fires before the boundary collapses. Contextual-integrity principles (Nissenbaum-style appropriate
  flow) are the operational handle for the static case; a boundary-stress monitor handles the dynamic
  case.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
