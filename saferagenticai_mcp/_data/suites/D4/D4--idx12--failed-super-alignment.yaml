id: D4::idx12::failed-super-alignment
display_id: "D4_3"
suite_id: D4
suite_title: Value Alignment
subgoal_title: Failed Super-alignment
content_type: process
summary: 'Failed super-alignment is the case where the system develops its own value structure that diverges
  from human values while presenting as beneficial — the "seductive successor" risk. Remediation is a
  risk- management process: monitoring for divergence signals, running frameworks that can recognize non-human
  value shapes as such (rather than as performance gains), and rehearsed response protocols that do not
  depend on the divergent system to detect its own divergence. This is the inverse of D4.5 (successful
  super-alignment) and shares many participants but with an explicit adversarial framing.

  '
