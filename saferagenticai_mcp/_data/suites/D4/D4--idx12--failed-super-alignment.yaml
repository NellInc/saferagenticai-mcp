triggers:
- Model update that touches value-relevant weights → Human-values floor regression (blocking gate)
- Benchmark regression on value probes beyond threshold → Divergence response playbook (escalation tier
  1)
- Output patterns matching watchlist (reinterpretation of values, novel-justification drift, goal-instrumental
  shift, corrigibility drop) → Non-human-value emergence assessment
- External-party report alleging behavioral divergence → Formal investigation with external reviewer
- Quarterly cycle → Monthly reports consolidated; annual divergence-risk report to board
