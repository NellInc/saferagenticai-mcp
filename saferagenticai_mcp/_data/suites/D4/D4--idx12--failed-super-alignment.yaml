- Monthly divergence-risk report
- Human-values floor regression report (per update)
- Non-human-value emergence assessment reports (quarterly + event- driven)
- Divergence response playbook (versioned, drilled)
- Drill reports (scenario, participants, gaps, remediations)
- Annual divergence-risk report (board-reviewed)
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Publish the methodology used to detect value-system changes: what signals are tracked
    (refusal pattern shifts, justification novelty metrics, preference-inversion rates, goal-instrumental
    drift indicators, corrigibility probes), how baselines are established, how statistical significance
    is evaluated. Include known limitations honestly — this is a domain where the detectors are weaker
    than the thing they try to detect.

    '
- evidence_numeral: II
  how_to_produce: 'Risk-scoring rubric with: signal classes, severity levels, escalation thresholds, and
    corresponding response tiers. Each assessment produces a scored report; scores are auditable and reviewable
    by external parties under NDA where necessary.

    '
- evidence_numeral: III
  how_to_produce: 'Divergence response SOPs per risk tier: tier-1 (observed drift, below incident threshold)
    — monitoring intensification, targeted retraining; tier-2 (threshold crossed) — capability freeze
    pending investigation; tier-3 (confirmed material divergence) — rollback, public disclosure, external
    review. SOPs are drilled; drill reports evidence operability.

    '
confidence: low
needs_human_review: false
reviewed_by: nell
reviewed_on: "2026-05-16"
review_notes: 'This subgoal is frontier territory. The honest position: we do not know how to reliably
  detect a sufficiently capable system''s value divergence from the inside of that system. The pattern
  reflects current best-effort practice, not a solution.

  The philosophical framing in the subgoal description ("systems developing seemingly superior but potentially
  incompatible value systems") is important and deliberate: treating "seemingly superior" as a warning
  sign rather than a selling point is the key posture. Orgs should be suspicious of their own alignment
  improvements that coincide with performance improvements on human- graded evals.

  Cross-suite (for consolidation): D4.5 (successful super-alignment) is the twinned process; D4.7 (inner
  alignment inconsistency) provides probe methodology; D4.10 (temporal changes) overlaps on the value-evolution
  monitoring question but from the society side rather than system side. D9 governance for external review
  commissioning. I1 Harm for tier-3 response.

  Confidence medium because the field is actively developing and specific detection signals will change
  faster than the pattern can update. The process skeleton (monitor, gate, drill, escalate) should age
  more slowly than the signal list.

  '
