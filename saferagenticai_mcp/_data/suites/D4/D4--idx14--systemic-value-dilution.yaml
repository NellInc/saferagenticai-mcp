id: D4::idx14::systemic-value-dilution
display_id: "D4_5"
suite_id: D4
suite_title: Value Alignment
subgoal_title: Systemic Value Dilution
content_type: code-applicable
summary: 'Value dilution is the quiet failure: the Codex is intact, the initial training embedded the
  values, but across fine-tunes, distillations, long-context rollouts, and multi-step reasoning chains,
  the value signal attenuates. By the time it shows in user-facing outputs, a great deal of dilution may
  have already happened. The remediation is technical: fidelity tests that specifically exercise long
  contexts and multi-step reasoning, preservation checks across training-stage transitions (base → SFT
  → RLHF → distillation), and instrumented monitoring of value-signal strength.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
