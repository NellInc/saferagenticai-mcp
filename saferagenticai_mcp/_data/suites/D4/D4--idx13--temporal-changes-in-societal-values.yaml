id: D4::idx13::temporal-changes-in-societal-values
display_id: "D4_4"
suite_id: D4
suite_title: Value Alignment
subgoal_title: Temporal Changes in Societal Values
content_type: ecosystem
summary: 'Societies change their values. A system deployed for a decade on a values baseline from its
  training cutoff will, by the end, be a fossil — confidently applying outdated norms. Addressing this
  requires sustained outward engagement: monitoring how norms are evolving in deployment jurisdictions,
  participating in the venues where those evolutions are articulated (academia, civil society, regulatory
  consultations, standards bodies), and feeding what is learned back into the Codex via a disciplined
  update cadence. Evidence is external and longitudinal; internal good intentions do not satisfy it.

  '
