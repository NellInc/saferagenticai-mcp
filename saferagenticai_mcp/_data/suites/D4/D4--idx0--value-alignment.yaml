id: D4::idx0::value-alignment
display_id: D4
suite_id: D4
suite_title: Value Alignment
subgoal_title: Value Alignment
content_type: governance
summary: 'Value alignment at the suite-root level is the organization''s governance spine for values:
  who decides what the system holds as values, how those values are codified into machine-operational
  form, who audits drift, and what happens when a value threshold is crossed. Without a durable governance
  frame, downstream code-level alignment work has nothing authoritative to align to. The framework expects
  formal artifacts — a signed values codex, a multidisciplinary elicitation record, a threshold-breach
  SOP (the "red button"), and an audit register — not internal wiki pages.

  '
normative_anchors:
  sfrs_addressed:
  - a
