id: D4::idx6::universal-moral-foundations
display_id: D4.6
suite_id: D4
suite_title: Value Alignment
subgoal_title: Universal Moral Foundations
content_type: governance
summary: 'Universal moral foundations — the near-consensus floor of humanitarian and environmental values
  that should not be traded away for performance — belong in a governance artifact with board-level ratification,
  not in ad-hoc product decisions. The framework expects the organization to name which international
  instruments it anchors to (UDHR, ICCPR, ICESCR, and emerging planetary/environmental rights), publish
  a hierarchy, and document the permissible trade-off frontier so engineers cannot individually override
  humanitarian floor values in pursuit of a KPI.

  '
