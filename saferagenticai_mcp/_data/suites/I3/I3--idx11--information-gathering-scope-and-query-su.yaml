confidence: high
needs_human_review: false
review_notes: 'This subgoal codifies the "query surface as capability surface" principle,
  which is operationally well-understood in traditional security (principle of least
  privilege for data access) but under-applied to agentic AI deployments where agents
  often receive broad information access by default. The independent authorization of query
  and action surfaces is the sharpest architectural ask; many current agent frameworks
  bundle read/write permissions together. The retention-with-scope-verification pattern
  addresses a subtler problem: even within authorized query bounds, information accumulation
  over time can create emergent capabilities. Cross-suite: I3 (context degradation patterns
  are related information-handling failures), I1.10 (emergent capabilities from information
  accumulation), D6.11 (reversibility and blast radius applies to information-gathering
  scope as well as action scope), D3.1 (authorization mechanisms that this subgoal
  specializes for query surfaces).

  '
