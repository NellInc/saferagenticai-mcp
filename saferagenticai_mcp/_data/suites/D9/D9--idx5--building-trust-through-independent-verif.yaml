id: D9::idx5::building-trust-through-independent-verif
display_id: D9.5
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Building Trust Through Independent Verification
content_type: governance
summary: 'Independent verification is the external-trust layer over the org''s internal governance — auditors
  and certifiers who do not work for the org, with mandate and access to test claims. This subgoal expects
  the org to make verification structurally possible (documentation, reproducible evaluation, bug-bounty-style
  community participation) and to welcome both heavy-weight certification and lighter verification approaches.

  '
