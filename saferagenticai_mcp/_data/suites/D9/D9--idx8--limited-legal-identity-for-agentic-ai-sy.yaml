id: D9::idx8::limited-legal-identity-for-agentic-ai-sy
display_id: D9.8
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Limited Legal Identity for Agentic AI Systems
content_type: governance
summary: 'Legal identity for AAI is an unsettled legal domain with live precedent candidates (quasi-municipal
  corporations, guardian ad litem, agency law, vicarious liability). This subgoal is not asking the org
  to solve it — it asks the org to adopt an internal framework that grants AAI bounded operational identity
  with clear limits, linked to named human principals, that can evolve as law and understanding catch
  up. Evidence is policy and licensing documentation, not litigation.

  '
