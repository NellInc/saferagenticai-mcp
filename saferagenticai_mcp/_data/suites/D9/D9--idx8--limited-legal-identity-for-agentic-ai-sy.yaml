policy_elements:
- name: AAI Internal Legal Identity Framework
  description: 'Written framework defining the org''s internal posture on AAI legal identity: operational
    purpose of limited identity (enabling action under delegated authority, supporting accountability,
    bounding liability), the analogues drawn on (quasi-municipal corporation, agency, guardian ad litem),
    and explicit rejection of identity-expansion that outruns accountability. Not a claim about external
    law; an internal commitment that shapes design and operations.

    '
  maps_to_sfr:
  - a
- name: AAI Licensing System
  description: 'Internal licensing mechanism: every production AAI agent type receives a "license" document
    binding (agent capability set, authorized principals, authorized domains, prohibited actions, licensing
    authority, validity, review date). Licenses are revocable on governance decision. Pairs with D9::6
    cryptographic identity — license is the human-readable layer over the cryptographic certificate.

    '
  maps_to_sfr:
  - b
- name: Agency Rules and Qualifiers
  description: 'Written rules of agency: what actions agents may take on behalf of principals, what qualifiers
    apply (monetary limits, irreversible action restrictions, multi-party consent requirements, time-of-
    day/jurisdiction scoping), what triggers an escalation or refusal. Echoes established agency-law patterns
    (actual authority, apparent authority, ratification) where helpful.

    '
  maps_to_sfr:
  - d
- name: Discretion-Standards document
  description: 'For each class of agent decision, a standard for the discretion the agent is granted:
    none (deterministic workflow), bounded (decision within explicit parameter ranges), principled (discretion
    guided by articulated standards), or human-in-the- loop. Categorisation is documented; agents operating
    beyond their stated discretion class are a policy violation.

    '
  maps_to_sfr:
  - e
- name: Human-Machine Responsibility Boundaries
  description: 'Policy document naming, per deployment domain, what is machine autonomy and what is human
    responsibility, with explicit "not autonomous" carveouts (e.g., legal determinations, medical diagnoses
    in jurisdiction X, decisions with irreversible physical consequences). Boundaries are conservative
    where law or ethics are unsettled; expansion requires board approval.

    '
  maps_to_sfr:
  - f
- name: Accountability Framework for All Agents
  description: 'Extends the D9::2 Accountability Framework to every agent type: each agent license names
    the accountable human principal, the fallback principal, and the liaison for disputes. Multi-agent
    deployments map each agent to its identified principals; no "orphan" agents.

    '
  maps_to_sfr:
  - c
- name: Evolution Review
  description: 'Named annual review — or triggered by legal / regulatory change — of the AAI Legal Identity
    Framework and licensing system, to incorporate new legal precedent, scholarship, and regulatory developments.
    Framework is explicitly expected to evolve as evidence about AI interests and welfare accumulates.

    '
  maps_to_sfr:
  - a
org_roles:
- role: Legal Counsel (AAI identity lead)
  responsibilities: 'Owns the AAI Internal Legal Identity Framework and its annual evolution review. Accountable
    for alignment with applicable law and for the framework''s integrity as law changes.

    '
  accountable_or_consulted: accountable
- role: Licensing Authority (internal body)
  responsibilities: 'Body (cross-functional: legal, safety, product, ethics) that reviews and issues AAI
    licenses, maintains the license register, and handles revocation. Meets at minimum quarterly; additionally
    on-demand for new agent classes.

    '
  accountable_or_consulted: accountable
- role: Principals (named humans)
  responsibilities: 'Named human principals for every licensed agent type. Attested in HR records. Receive
    escalations from their agents; answerable for agent actions within license scope.

    '
  accountable_or_consulted: responsible
- role: Ethics and Welfare Advisor
  responsibilities: 'Consulted on Evolution Review, especially on questions touching AI moral status,
    welfare, and rights developments. Maintains a watching brief on scholarship and policy developments.

    '
  accountable_or_consulted: consulted
- role: Board AAI Safety Committee
  responsibilities: 'Informed of license register changes, Evolution Review outcomes, and any expansion
    of human-machine boundary. Authority over boundary expansions.

    '
  accountable_or_consulted: informed
