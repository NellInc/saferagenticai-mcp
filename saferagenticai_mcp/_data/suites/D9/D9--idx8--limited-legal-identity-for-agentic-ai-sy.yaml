evidence_production:
- evidence_numeral: I
  how_to_produce: 'Publish the AAI Internal Legal Identity Framework document defining scope (what the
    framework does and does not claim), limitations (explicit disclaimers about external legal effect),
    and version history. Reviewed by legal counsel and signed by the accountable human.

    '
- evidence_numeral: II
  how_to_produce: 'License register export: each agent type, its license document (capability set, principals,
    prohibitions, validity, review date), issuance date, issuer, revocations and reasons. Process diagrams
    of licensing workflow retained as supporting artifacts.

    '
- evidence_numeral: III
  how_to_produce: 'Accountability framework extension: for each agent type, the named accountable principal,
    the fallback, the liaison for disputes, and the interaction map to other agents within the system.
    International-considerations annex addressing cross- jurisdictional agent operation. Scalability annex
    describing how the framework holds as deployments grow.

    '
- evidence_numeral: IV
  how_to_produce: 'Agency rules and qualifiers document with per-rule rationale, legal-analogue reference
    where applicable, qualifying conditions, examples of in-scope and out-of-scope behaviors. Change log
    records rule evolution.

    '
- evidence_numeral: V
  how_to_produce: 'Human-Machine Responsibility Boundaries policy with, for each deployment domain, a
    boundary map (autonomous, conditional, human-responsible), the rationale, the reviewer, and the expansion-approval
    log. Training materials show boundary communication to operators.

    '
