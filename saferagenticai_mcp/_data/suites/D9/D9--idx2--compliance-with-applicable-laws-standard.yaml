id: D9::idx2::compliance-with-applicable-laws-standard
display_id: D9.2
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Compliance with Applicable Laws, Standards & Ethical Norms
content_type: governance
summary: 'Compliance for AAI is not a snapshot against one jurisdiction''s rulebook; it is a living mapping
  between the organization''s capabilities and a moving landscape of laws, standards, and ethical norms
  across every jurisdiction of operation. This subgoal expects named accountability, traceable violation
  handling, and a real dispute route for people affected — outputs are durable documents, not attestations.

  '
