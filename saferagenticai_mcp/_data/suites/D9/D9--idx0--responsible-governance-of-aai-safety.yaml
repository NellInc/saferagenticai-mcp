id: D9::idx0::responsible-governance-of-aai-safety
display_id: D9
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Responsible Governance of AAI Safety
content_type: governance
summary: 'This is the umbrella governance subgoal: it asks the organization to stand up a named, board-anchored
  AAI governance function with budgeted safety resources, independent audit, whistleblower protection,
  and horizon scanning. Treat it as the parent under which the other D9 subgoals hang; evidence here is
  structural (the governance body exists, has authority, meets, and produces artifacts), not aspirational.

  '
