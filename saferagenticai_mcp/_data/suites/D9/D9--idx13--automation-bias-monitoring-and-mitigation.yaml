suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Automation Bias Monitoring and Mitigation
content_type: code-applicable
summary: 'Human-in-the-loop checkpoints degrade when humans over-trust agent outputs. This subgoal asks
  organizations to measure oversight effectiveness through quantitative indicators: (1) track human override
  rates with alerts on low rates indicating rubber-stamping, (2) monitor reviewer response times for
  superficial review patterns, (3) detect statistical outlier reviewers, (4) conduct blind error-injection
  audits, and (5) train overseers on agent failure modes including that chain-of-thought reasoning is
  not necessarily faithful explanation. Without active measurement, HITL becomes accountability theater.

  '
normative_anchors:
  sfrs_addressed:
  - a
