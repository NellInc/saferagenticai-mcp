id: D9::idx12::poor-attribution-of-responsibility-in-co
display_id: "D9_3"
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Poor Attribution of Responsibility in Complex Systems
content_type: code-applicable
summary: 'Attribution failure is a policy failure masquerading as a technical limit: without unique identifiers
  for each agent, durable linkage to the principal on whose behalf each agent acts, and tamper-evident
  tracing, "no one is to blame" becomes the default. This subgoal expects concrete identity-and-tracing
  machinery similar to business registration — every AAI instance registered, every action traceable to
  a principal, every attribution claim backed by cryptographic proofs. The technical controls are the
  attribution policy.

  '
