id: D9::idx4::internationalization-of-aai-governance
display_id: D9.4
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Internationalization of AAI Governance
content_type: ecosystem
summary: 'This subgoal lives outside the org''s four walls: it asks whether the organization is actively
  participating in and aligning with international AAI governance — standards bodies, cross-jurisdiction
  agreements, identity and trust frameworks — rather than optimising for a single jurisdiction''s rules.
  Evidence is external: participation records, adoption of shared standards, harm-scale assessments that
  cross borders.

  '
