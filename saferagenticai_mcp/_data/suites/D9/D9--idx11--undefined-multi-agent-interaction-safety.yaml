id: D9::idx11::undefined-multi-agent-interaction-safety
display_id: "D9_2"
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Undefined Multi-Agent Interaction Safety
content_type: process
summary: 'Safe individual agents can compound into unsafe ensembles. This subgoal expects the organization
  to treat multi-agent interaction as a first- class risk domain: monitor inter-agent communications for
  the information-environment effects agents have on each other, instrument for cascading failure, and
  maintain protocols for detecting and intervening on emergent behaviors that no single agent was designed
  to produce. Evidence lives in interaction logs, cascade-prevention tests, and emergent-behavior investigations.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  - d
  - e
  evidence_addressed:
  - I
  - II
  - III
  - IV
  - V
  sfrs_not_addressed: []
  evidence_not_addressed: []
cross_references:
