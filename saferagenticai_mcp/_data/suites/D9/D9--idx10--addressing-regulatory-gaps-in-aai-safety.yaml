id: D9::idx10::addressing-regulatory-gaps-in-aai-safety
display_id: "D9_1"
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Addressing Regulatory Gaps in AAI Safety
content_type: governance
summary: 'AAI capability develops faster than regulation. This subgoal (an inhibitor-variant sitting under
  D9) expects the organization to identify where existing AI regulation is silent on AAI-specific risks
  and backstop those gaps with internal policy — without waiting for law to catch up, and without claiming
  more than applicable law requires. Evidence is the gap register itself, the internal assurance strategy
  that fills it, and ongoing training to keep staff current.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  - d
  evidence_addressed:
  - I
  - II
  - III
  - IV
  sfrs_not_addressed: []
  evidence_not_addressed: []
cross_references:
