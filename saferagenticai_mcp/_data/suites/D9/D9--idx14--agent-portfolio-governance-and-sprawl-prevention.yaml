id: D9::idx14::agent-portfolio-governance-and-sprawl-prevention
display_id: "D9_5"
is_underlined_variant: true
display_id_variant_note: "D9.5_underlined"
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Agent Portfolio Governance and Sprawl Prevention
content_type: code-applicable
summary: 'As organizations deploy agents across teams and functions, without centralized inventory management
  agent sprawl creates compounding governance failures: orphaned agents operating without oversight,
  version incompatibilities between agent generations, cumulative security exposure from forgotten deployments,
  and provenance failures when no one knows who authorized an agent. This subgoal asks for: (1) a centralized
  agent registry with ownership and authorization records, (2) lifecycle management including mandatory
  re-authorization, (3) portfolio audits for orphaned or unauthorized agents, (4) compatibility standards
  for multi-agent environments, and (5) formal retirement procedures with credential revocation.

  '
