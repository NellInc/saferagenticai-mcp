design_patterns:
- name: Centralized agent registry
  sketch: 'Every deployed agent gets a registry entry: unique ID, owning team, authorizing human, permitted
    action scope, deployment date, last review date, and expiration date. Registry is the single source
    of truth; agents not in the registry are unauthorized by definition and subject to immediate decommission.
    Registry access is read-only for most teams; write access requires governance approval. Fields are
    machine-readable to enable automated compliance checks.

    '
  maps_to_sfr:
  - a
  when_to_use: Any organization deploying more than a handful of agents across multiple teams or functions.
- name: Mandatory re-authorization cycle
  sketch: 'Agents expire after a defined period (e.g., 90 days for high-privilege agents, 180 days for
    low-privilege) and must be actively re-authorized by their owning team. Re-authorization includes
    reviewing current scope, active access permissions, continued business justification, and any incidents
    since last review. Agents not re-authorized before expiry are automatically decommissioned and their
    credentials revoked. Re-authorization is non-delegable to the agent itself.

    '
  maps_to_sfr:
  - b
  when_to_use: When agent deployments persist across quarters or are managed by rotating team membership.
- name: Orphan detection sweep
  sketch: 'Automated periodic scan comparing running agent processes and active credentials against the
    registry. Any agent found running without a current registry entry, or with an expired entry, is
    flagged for immediate review with automatic credential suspension pending investigation. Sweep runs
    at least weekly; results reported to the security and governance teams. Detected orphans are traced
    to their origin and the authorization gap addressed.

    '
  maps_to_sfr:
  - c
  when_to_use: Organizations with more than ten deployed agents, or any organization where agents hold
    persistent credentials.
anti_patterns:
- name: Shadow agent deployment
  why_wrong: 'Teams deploying agents ad-hoc without registering them, typically because the registration
    process is perceived as too burdensome. The agents function initially but become orphaned when team
    members rotate or projects end. Creates invisible attack surface, governance gaps, and credential
    accumulation that compound silently. The fix is to reduce registration friction, not tolerate shadow
    deployments.

    '
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Agent registry export: current entries with fields (ID, owner, authorizer, scope,
    dates). Schema documentation. Access control configuration showing who can write to the registry
    and under what approval process.

    '
- evidence_numeral: II
  how_to_produce: 'Re-authorization process documentation: expiry policy per privilege tier, re-authorization
    checklist, notification timeline, automatic decommission procedure, and credential revocation confirmation.
    Log of re-authorizations completed and agents decommissioned in the last cycle.

    '
- evidence_numeral: III
  how_to_produce: 'Orphan detection sweep configuration: scan frequency, detection logic, alert recipients,
    suspension procedure, and investigation SLA. Sweep results log for the past 12 months with orphans
    found, investigated, and resolved.

    '
- evidence_numeral: IV
  how_to_produce: 'Retirement procedure documentation: steps for graceful agent shutdown, credential
    revocation confirmation, registry update, data handling for agent-stored state, and post-retirement
    audit. Sample retirement records.

    '
- evidence_numeral: V
  how_to_produce: 'Annual portfolio audit: total agents registered vs. discovered via sweep, orphan rate
    trend, re-authorization compliance rate, and governance review conclusion. Remediation plan if compliance
    is below threshold.

    '
confidence: medium
needs_human_review: true
review_notes: 'The mandatory re-authorization cycle expiry period (90/180 days) is illustrative; the
  appropriate interval depends on organizational risk tolerance and agent privilege level and should be
  set explicitly in policy. The "shadow agent deployment" anti-pattern is a genuine cultural challenge
  — registration friction is a real barrier and reducing it is as important as enforcing compliance.
  Cross-suite: D9::idx12 (poor attribution of responsibility), D5 (authorization and scope), D9::idx5
  (independent verification), I5 (manipulation and deception via rogue agents).

