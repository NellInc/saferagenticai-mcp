id: D9::idx7::appropriate-accountability-transparency-
display_id: D9.7
suite_id: D9
suite_title: Responsible Governance of AAI Safety
subgoal_title: Appropriate Accountability & Transparency Practices
content_type: governance
summary: 'Accountability and transparency are answerability — who made which decision, on what basis,
  and how an outsider can learn enough to hold them responsible. This subgoal expects the org to adopt
  established standards (system cards, model cards, incident disclosure norms), name accountability protocols
  between interoperating subsystems, and keep stakeholder communications honest — including about limits.
  The framework''s "achievable goals rather than unrealistic aspirations" language is the license to be
  specific about what transparency you can actually deliver.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  - d
  evidence_addressed:
  - I
  - II
  sfrs_not_addressed: []
  evidence_not_addressed: []
cross_references:
