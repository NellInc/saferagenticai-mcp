id: I6::idx0::competitive-pressures
display_id: "G6"
is_underlined_variant: true
suite_id: I6
suite_title: Competitive Pressures
subgoal_title: Competitive Pressures
content_type: governance
summary: 'Competitive pressure is where every other safety commitment is tested. This overarching subgoal
  asks the organization to install structural defences against its own bad incentives: a competitive-pressure
  override register, investor and market-pressure attestations, technology-maturity gating, and a board-level
  pause authority. The pattern expects durable artifacts — registers, attestations, RACI — not statements
  of intent.

  '
