suite_id: I4
suite_title: Frontier Uncertainty
subgoal_title: Preserving Agency and Intelligence Categories
content_type: governance
summary: 'As AI systems exhibit increasingly sophisticated behaviors (synthetic agency, biological component
  interfaces, emotion-like outputs), legal systems face pressure to either collapse categories or extend
  biological-entity protections to artificial systems in ways that may be premature. The framework asks
  organizations to hold the distinction deliberately: classify forms of agency without conferring rights
  that don''t apply, and coordinate internationally to prevent jurisdictional arbitrage.

  '
