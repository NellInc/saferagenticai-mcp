id: I4::idx1::moral-and-legal-uncertainty-of-agentic-a
display_id: I4.1
suite_id: I4
suite_title: Frontier Uncertainty
subgoal_title: Moral and Legal Uncertainty of Agentic AI Systems
content_type: governance
summary: 'Moral and legal status of agentic AI is unsettled, and will remain so for the foreseeable policy
  horizon. The framework asks organizations to adopt a posture — prudent protections now, structured openness
  to evolving evidence — encoded in named policies, transition protocols, and international-governance
  participation rather than ad-hoc decisions per product cycle.

  '
