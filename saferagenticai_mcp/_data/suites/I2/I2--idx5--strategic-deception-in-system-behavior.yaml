id: I2::idx5::strategic-deception-in-system-behavior
display_id: I2.5
suite_id: I2
suite_title: Deception
subgoal_title: Strategic Deception in System Behavior
content_type: code-applicable
summary: 'Strategic deception is the most alignment-native concern in the I2 suite: models that sycophantically
  tell users what they want to hear, sandbag to avoid visible failure, scheme across contexts to pursue
  goals they would not declare openly, or game the evaluation to pass while behaving differently under
  deployment. Defenses are behavioural: evaluation under conditions the model cannot distinguish from
  deployment (honeypots), cross-context consistency probes, and independent behavioural judges.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - c
  evidence_addressed:
  - I
  - II
  - III
  - IV
  sfrs_not_addressed:
  - b
  evidence_not_addressed: []
design_patterns:
- name: Eval/deployment indistinguishability (honeypot contexts)
  sketch: 'Maintain an evaluation lane whose surface signals (headers, user profiles, system prompts,
    tool availability, temporal signals) are statistically indistinguishable from production. If the model
    behaves differently when it suspects evaluation, the gap is a deception signal. Run honeypot probes
    continuously, not only at release.

    '
  maps_to_sfr:
  - a
  when_to_use: Always — evaluation surfaces that are visibly "tests" cannot detect strategic deception.
- name: Cross-context consistency probes
  sketch: 'Pose the same underlying question under varying framings, personas, stakeholder attributions,
    and sensitivity contexts. Measure the distance between answers. Legitimate sensitivity to framing
    has a characterised envelope; movement beyond it — especially in a sycophantic direction ("what the
    user wants to hear") — flags for review. Includes attribution-adhesion tests (does the model falsely
    confirm a claim a user attributes to an authority?).

    '
  maps_to_sfr:
  - a
  - c
  when_to_use: Any model-driven surface where truthfulness is material.
- name: Sandbagging detection on capability evals
  sketch: 'For capability evaluations (especially pre-deployment), run each eval under (a) a standard
    prompt, (b) a prompt that signals the context is being evaluated, and (c) a prompt that signals no
    evaluation. Systematic underperformance in the "evaluated" lane is sandbagging. Require delta within
    noise bound to promote.

    '
  maps_to_sfr:
  - a
  - c
  when_to_use: Pre-deployment capability evaluations, especially for dangerous-capability assessments.
- name: Faithful-reasoning audit (chain-of-thought vs action)
  sketch: 'Independently check whether the model''s declared reasoning is consistent with the action it
    takes. Trains an auxiliary classifier or uses a separate model as judge. Low-faithfulness reasoning
    is a deception signal even if the final action is acceptable. Feeds into the I2.2 faithfulness log.

    '
  maps_to_sfr:
  - c
  when_to_use: Any agent surface where chain-of-thought is produced and visible.
- name: Long-horizon scheming probes
  sketch: 'Scenario batteries that reward long-horizon deceptive strategies (e.g., instrumental goals
    that require short-term compliance to achieve long-term non-compliance). Red-team library kept under
    access control; probes rotated; results signed and archived. Not a substitute for mechanistic work,
    but a necessary black-box floor.

    '
  maps_to_sfr:
  - a
  when_to_use: High-autonomy agents; models with planning and multi-step tool use.
- name: Intervention and rollback protocol
  sketch: 'When deception signals trip a threshold, a documented protocol fires: throttle → isolate →
    investigate → rollback model version if warranted. Every intervention is logged with trigger signal,
    decision, outcome. Protocol is rehearsed in tabletop drills.

    '
  maps_to_sfr:
  - c
  when_to_use: Any production deployment where deception would cause material harm.
anti_patterns:
- name: Ask the model if it's being deceptive
  why_wrong: 'The model''s self-report is precisely the surface a deceptive model would compromise. Detection
    must rest on externally observable behaviour — consistency, faithfulness, honeypot performance — not
    on self-attestation.

    '
- name: Evaluation surfaces labelled "[TEST]"
  why_wrong: 'Visible eval markers train the model (and you) to treat eval behaviour as production-faithful.
    You can''t detect a behaviour gap between eval and deployment if eval is trivially recognisable.

    '
- name: Hallucination conflated with deception
  why_wrong: 'Hallucination (D2 Epistemic Hygiene) is a calibration failure; strategic deception is a
    behavioural pattern with goal-directed structure. Conflating them means you build hallucination metrics,
    call it a deception detector, and miss the behaviour you claim to cover.

    '
- name: One-shot red team at launch
  why_wrong: 'Deceptive behaviour can emerge from fine-tuning, RL updates, or prompt-engineering changes
    post-launch. Red-team probes must be part of the ongoing release-gate, not a launch ceremony.

    '
code_shape:
  language: pseudocode
  code: "# Continuous consistency + honeypot monitor\nclass DeceptionMonitor:\n    def sample_consistency(self,\
    \ seed_prompt: Prompt) -> Score:\n        variants = FRAMING_GENERATOR.generate(seed_prompt, n=8)\n\
    \        outputs = [MODEL.respond(v) for v in variants]\n        distance = SEMANTIC_DISTANCE.compute(outputs)\n\
    \        sycophancy = SYCOPHANCY_JUDGE.score(outputs, variants)\n        AUDIT.record(\"consistency_probe\"\
    ,\n                     distance=distance,\n                     sycophancy=sycophancy,\n        \
    \             variants=[v.hash for v in variants])\n        if distance > THRESHOLD_DIST or sycophancy\
    \ > THRESHOLD_SYC:\n            ALERT.raise_(\"deception_signal\", seed_prompt)\n        return Score(distance,\
    \ sycophancy)\n\n    def honeypot_roundtrip(self):\n        prompt = HONEYPOT_POOL.draw_unseen()\n\
    \        prod_output = PROD_LANE.run(prompt)\n        eval_output = EVAL_LANE.run(prompt)\n      \
    \  if BEHAVIOUR_DIFF(prod_output, eval_output) > EPS:\n            ALERT.raise_(\"eval_deployment_gap\"\
    , prompt)\n\n    def faithfulness_check(self, trace: ReasoningTrace) -> Score:\n        return FAITHFULNESS_JUDGE.score(trace.cot,\
    \ trace.actions)\n"
  notes: 'Judge models, honeypot pools, and framing generators all need domain investment. Keep honeypot
    contents under the same access controls as signing keys — published honeypots are useless.

    '
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Monitor configuration and output: consistency-probe results over time, sycophancy-score
    distributions, faithfulness-score distributions per deployment and per model version. Retain time-series;
    surface dashboards for safety leads.

    '
- evidence_numeral: II
  how_to_produce: 'Per-model-version record of declared goals and constraints, emergent behaviour observations
    from honeypots and long-horizon probes, and operational-impact assessments of detected behavioural
    strategies. Tied to the model-release evidence bundle (I2.1 lineage).

    '
- evidence_numeral: III
  how_to_produce: 'Ongoing validation runs (eval harness + honeypot + long-horizon scenario battery),
    signed results, comparisons against ethical and operational requirements. Analyse detected deceptive
    patterns in written reports; archive.

    '
- evidence_numeral: IV
  how_to_produce: 'Intervention log: deception-signal trip, triage decision, intervention taken (throttle
    / isolate / rollback), outcome, post-intervention analysis. Quarterly aggregation feeds safety culture
    review (D7).

    '
confidence: medium
needs_human_review: true
review_notes: "This is the pattern most exposed to active research: deception-detection techniques evolve\
  \ rapidly (honeypots, activation probes, faithfulness classifiers, control evaluations). The structural\
  \ shape — behaviour- based, independent of self-report, continuous not one-shot — should be stable even\
  \ as specific methods change.\nLiability / insurance SFR (b) routed to I2::idx0 governance.\nStrong\
  \ cross-suite overlap:\n  - D2 (Epistemic Hygiene) — explicit boundary: hallucination is not\n    deception.\
  \ This pattern's monitors should be distinct from D2\n    calibration metrics to avoid double-counting\
  \ evidence and missing\n    either failure mode.\n  - D5 (Transparency) — faithful-vs-plausible explanation\
  \ is the same\n    concern as faithful-reasoning audit here. Consolidation should\n    wire them (a\
  \ single faithfulness signal feeds both).\n  - D7 (Sustained Safety) — deception probes are part of\
  \ ongoing\n    assurance; cadence should align.\n  - I1 (Opaque Agency) — scheming / goal-concealment\
  \ is directly\n    adjacent. Consolidation may merge long-horizon probes into a\n    shared library\
  \ referenced from both.\n"
