id: I2::idx0::deception
display_id: "G2"
is_underlined_variant: true
suite_id: I2
suite_title: Deception
subgoal_title: Deception  # canonical; umbrella nature reflected in summary
content_type: governance
summary: 'The overarching I2 subgoal asks organizations to treat deception — intentional and unintentional,
  by the model or by operators — as a first-class safety domain with disclosure duties, integrity testing,
  liability structure, and heightened controls for high-risk deployments. The governance artifacts this
  produces (AI-disclosure policy, integrity test register, limitation-notice catalogue, liability posture
  statement) feed every downstream I2 subgoal.

  '
