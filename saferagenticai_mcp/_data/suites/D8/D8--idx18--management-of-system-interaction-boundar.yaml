id: D8::idx18::management-of-system-interaction-boundar
display_id: "D8_7"
is_underlined_variant: true
display_id_variant_note: "D8.7_underlined"
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Management of System Interaction Boundaries
content_type: code-applicable
summary: 'Every interaction boundary between agents (internal/external, same jurisdiction / different
  jurisdiction, same trust level / different) is a place where termination, data residency, and policy
  obligations can diverge. This subgoal expects a comprehensive interface catalogue with explicit configuration
  per boundary, deployed-time communication of constraints to agents, and runtime enforcement of cross-boundary
  rules.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  - d
  - e
  evidence_addressed:
  - I
  - II
