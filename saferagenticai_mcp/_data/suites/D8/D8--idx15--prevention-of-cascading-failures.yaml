suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Prevention of Cascading Failures
content_type: code-applicable
summary: 'When agents depend on each other, one agent''s failure or termination can propagate: its consumers
  hang, retry storms ensue, fallback agents overload, and a localized problem becomes systemic. This subgoal
  expects circuit-breaker-style containment, explicit dependency mapping, and cascade-aware shutdown ordering
  — standard resilience engineering, applied specifically to multi-agent AI systems.

  '
