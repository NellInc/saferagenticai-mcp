id: D8::idx3::multi-agent-communication-and-coordinati
display_id: D8.3
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Multi-Agent Communication and Coordination
content_type: code-applicable
summary: 'When agents coordinate on a shared goal, termination becomes a distributed-systems problem:
  how does agent A know that agent B''s subtask is complete, cancelled, or stuck? This subgoal expects
  a reliable inter-agent messaging substrate with explicit primitives for status, shutdown, and conflict
  — not ad-hoc shared state or best-effort broadcasts.

  '
