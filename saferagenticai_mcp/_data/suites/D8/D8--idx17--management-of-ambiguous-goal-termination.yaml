suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Management of Ambiguous Goal Termination
content_type: process
summary: 'Many real-world goals lack crisp completion criteria: "make this feature work well," "support
  users until they no longer need help," "maintain safe behavior." Ambiguity makes termination a judgement
  call — the framework expects a defined process for exercising that judgement, not a default to indefinite
  continuation or arbitrary stop. The process covers both explicit policy and implicit normative guidance
  (ethical, business, cultural).

  '
