id: D8::idx13::agent-lifecycle-and-termination-manageme
display_id: "D8_2"
is_underlined_variant: true
display_id_variant_note: "D8.2_underlined"
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Agent Lifecycle and Termination Management
content_type: governance
summary: 'Agent lifecycle is a contract spanning commissioning, active service, and decommissioning. This
  subgoal formalizes the contract: no agent may be authorized into production without a declared termination
  specification, and no agent may be signed off as terminated without verified handover and post-termination
  inspection. "Inadequate termination procedures" is explicitly called out as a risk category — the organization
  must demonstrate it has remedied that risk with process, not just intent.

  '
