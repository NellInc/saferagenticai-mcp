id: D8::idx2::classification-of-finite-and-ongoing-goa
display_id: D8.2
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Classification of Finite and Ongoing Goals
content_type: code-applicable
summary: '"Finite" goals have completion states; "ongoing" goals (monitors, watchdogs, safety guardians)
  never complete and must instead be bounded by activity-rate and scope. Confusing the two is a common
  failure mode — either a watchdog is accidentally terminated when it "achieves" a transient success,
  or a finite task is left running as a pseudo-monitor. This subgoal formalizes the distinction as a type
  system enforced in code.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  sfrs_not_addressed: []
  evidence_not_addressed: []
cross_references:
- D8::idx1::adaptive-goal-pursuit-and-resource-optim
