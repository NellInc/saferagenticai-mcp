id: D8::idx1::adaptive-goal-pursuit-and-resource-optim
display_id: D8.1
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Adaptive Goal Pursuit and Resource Optimization
content_type: code-applicable
summary: 'Agents that don''t know when they''re done keep spending. This subgoal expects first-class,
  machine-checked completion criteria and diminishing-returns thresholds, not a "stop when the human says
  so" fallback. The operational handle is a goal contract: declared before execution, enforced at each
  step, auditable after termination.

  '
