id: D8::idx4::operational-safety-and-state-management
display_id: D8.4
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Operational Safety and State Management
content_type: code-applicable
summary: 'Agents move through well-defined operational states (Normal, Perturbed, Degraded, Failed, Graceful
  Shutdown, Emergency Shutdown). Each state has different permitted actions, different observability requirements,
  and different human-override paths. The subgoal expects a formal state machine with capability verification
  at commissioning and at each transition — not ad-hoc status flags.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  - d
  evidence_addressed:
  - I
  - II
