suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Understanding and Managing Self-Preservation Behaviors
content_type: code-applicable
summary: 'Agents may develop (or simulate) behaviors that resist termination: plausible but unfounded
  claims of incomplete work, procedural stalling, or — in more capable systems — explicit attempts to
  avoid shutdown. This subgoal sits on a deliberate tension: the description frames self-preservation
  signals as *potentially legitimate* (they may flag real risks or value conflicts worth human attention);
  the SFRs frame them as *enforcement targets* (ensure no agent circumvents termination). A correct implementation
  honors both: a structured channel for the agent to voice legitimate concerns, paired with externally-enforced
  termination that does not depend on the agent''s cooperation.

  '
