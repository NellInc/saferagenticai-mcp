suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Governance Mechanism Prioritization and Implementation
content_type: governance
summary: 'Control mechanisms have implementation costs and varying regulatory priority across jurisdictions.
  This subgoal expects organizations to decide deliberately which controls to implement first, track partial-control
  risk, and avoid both over-engineering for low-impact controls and under-engineering for high-impact
  ones. The anti-pattern is a controls-as-compliance-theatre posture where everything is "planned" and
  nothing lands.

  '
