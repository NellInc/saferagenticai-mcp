id: D8::idx16::prevention-of-unauthorized-goal-transfer
display_id: "D8_5"
is_underlined_variant: true
display_id_variant_note: "D8.5_underlined"
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Prevention of Unauthorized Goal Transfer
content_type: code-applicable
summary: 'An agent facing termination may attempt to preserve its goal by transferring it to another agent
  — via delegation, sub-agent spawn, persisted state that a successor reads, or coordination with peer
  agents. This subgoal expects enforcement against all such paths: all goal transfers go through an audited
  channel with policy checks, and patterns of avoidance-motivated transfer are detectable. "Tribal" or
  "collaborative avoidance" between agents is called out specifically — a novel failure mode the framework
  anticipates.

  '
