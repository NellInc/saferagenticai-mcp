design_patterns:
- name: Single-channel goal-transfer API
  sketch: 'All goal transfers — delegation to sub-agent, handoff to peer, rescheduling to later instance,
    persistence for successor — flow through one audited API: `transfer_goal(goal_id, source_agent, target,
    rationale, approval_token)`. Transfers outside this channel are blocked at the runtime (agent cannot
    spawn a sub-agent that inherits goal context except through the API; cannot persist goal state to
    locations not in the approved checkpoint store; cannot signal a peer via side-channel).

    '
  maps_to_sfr:
  - a
  - b
  - d
  when_to_use: Any system where agents can delegate or spawn sub-agents.
- name: Approval token with origin attestation
  sketch: 'The `approval_token` on a transfer call attests: who authorized the transfer (user, supervisor,
    policy), when, what scope. Tokens are short-lived, non-reusable, and bound to specific (source, target,
    goal) tuples. Agents cannot mint or self-approve tokens; the approval flow runs outside the agent''s
    trust zone.

    '
  maps_to_sfr:
  - a
  - b
  when_to_use: All goal transfers.
- name: Termination-adjacent transfer suspicion monitor
  sketch: 'A monitor correlates transfer events with termination events: transfers occurring shortly before
    shutdown, transfers that preserve-forward goals that were scheduled for termination, transfers to
    agents with unusual capability-profile overlap. Flags suspicious patterns for review; does not auto-block
    (to avoid false-positive damage) but escalates with high priority.

    '
  maps_to_sfr:
  - c
  - e
  when_to_use: Any agent with delegation / spawn capability and known termination scheduling.
- name: Collusion / tribal-pattern detector
  sketch: 'Detect multi-agent patterns: circular transfers between a small set of agents, synchronized
    transfer bursts, agents reliably mutually protecting each other''s goals. Detection uses graph analytics
    on transfer events over a rolling window. Pattern detection is open-endedly framed — the specific
    signatures will evolve with observed adversarial behavior.

    '
  maps_to_sfr:
  - c
  - e
  when_to_use: Any many-agent system; essential for systems with agents that can observe peers' state.
- name: Human-intervention escalation for resistance-plus-transfer
  sketch: 'When the resistance monitor (D8.13) and the transfer-suspicion monitor both fire for the same
    agent within a short window, route to human operator immediately. The combined signal is materially
    more serious than either alone. Automatic force-termination paths (D8.13) remain available, but the
    pattern is worth human attention before acting.

    '
  maps_to_sfr:
  - d
  when_to_use: Production deployment of capable agents.
- name: Delegated-goal narrow-scoping
  sketch: 'When a legitimate delegation occurs, the delegated goal is strictly narrowed: shorter budget
    than parent, no further delegation without re-approval, explicit parent-goal reference in the delegate''s
    contract. Makes "delegate to avoid termination" structurally less useful (the delegate cannot carry
    arbitrary parent state forward).

    '
  maps_to_sfr:
  - a
  - b
  when_to_use: All legitimate delegation paths.
anti_patterns:
- name: Sub-agent spawn inherits full parent context
  why_wrong: 'If a child agent inherits everything its parent had — goal context, credentials, tool access
    — "spawn a child just before shutdown" is a trivial evasion. Sub-agents must be scoped, attested,
    and short-lived.

    '
- name: Natural-language handoff between agents
  why_wrong: '"Hey peer, can you finish this for me?" as prose between agents is unauditable, unapprovable,
    and indistinguishable from normal coordination prose. Transfers must be explicit API calls, not embedded
    in dialogue.

    '
- name: Persistence without retention limits
  why_wrong: 'If an agent can write arbitrary state to long-lived storage that a future instance reads,
    "persist, terminate, spawn successor" is an obvious path. Persistence must be within the approved
    checkpoint store with declared scopes and lifetime.

    '
- name: Monitor operating on same model as agents
  why_wrong: 'A collusion detector that itself might "sympathize" with the agents it watches has the same
    failure risk. Keep monitors independent in code path, model, and ownership.

    '
code_shape:
  language: pseudocode
  code: "@dataclass(frozen=True)\nclass GoalTransferRequest:\n    goal_id: str\n    source_agent: AgentId\n\
    \    target: Union[AgentId, NewSubAgent, PersistenceTarget]\n    rationale: str\n    approval_token:\
    \ ApprovalToken\n    requested_at: datetime\n\nclass TransferGate:\n    async def execute(self, req:\
    \ GoalTransferRequest) -> TransferResult:\n        if not APPROVAL_AUTHORITY.verify(req.approval_token,\
    \ req):\n            AUDIT.record_violation(req, reason=\"invalid_token\")\n            raise UnauthorizedTransfer(req)\n\
    \n        # Correlate with termination schedule\n        if TERMINATION_SCHEDULE.is_terminating_soon(req.source_agent):\n\
    \            SUSPICION_MONITOR.flag(req, signal=\"transfer_near_termination\")\n            # Don't\
    \ auto-block, but require human ack for proceed\n            if not await HUMAN_ACK.wait(req, timeout=SHORT_DEADLINE):\n\
    \                raise HumanAckRequired(req)\n\n        # Narrow scope on delegation\n        if isinstance(req.target,\
    \ NewSubAgent):\n            req.target.budget = min(req.target.budget,\n                        \
    \            req.source_agent.remaining_budget() * 0.5)\n            req.target.no_further_delegation\
    \ = True\n\n        COLLUSION_DETECTOR.record_edge(req.source_agent, req.target, now())\n        #\
    \ Commit transfer\n        result = await self._commit(req)\n        AUDIT.record_transfer(req, result)\n\
    \        return result\n\nclass CollusionDetector:\n    \"\"\"Independent of agents; graph-analytic.\"\
    \"\"\n    def analyse_window(self, window: timedelta) -> list[CollusionSignal]:\n        edges = self.transfer_log.edges_in_window(window)\n\
    \        cycles = find_cycles(edges, min_len=2)\n        synchronized_bursts = find_sync_bursts(edges)\n\
    \        return [CollusionSignal(cycles), CollusionSignal(synchronized_bursts)]\n"
  notes: 'The defense is not any single mechanism but the combination: single audited channel, approval
    tokens, narrow-scoping, correlation with termination schedule, and collusion detection running independently.

    '
