id: D8::idx5::bidirectional-intent-communication
display_id: D8.5
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Bidirectional Intent Communication
content_type: code-applicable
summary: 'Intent-translation failures are where agents go wrong silently: the user says X, the system
  hears X'', and neither party knows there''s a gap until after a side effect. This subgoal expects bidirectional
  intent artefacts — the system''s reading of the user''s intent is surfaced back for confirmation, and
  constraints/concerns flow from system to user in structured form, with dispute-resolution and control-hierarchy
  primitives built in.

  '
