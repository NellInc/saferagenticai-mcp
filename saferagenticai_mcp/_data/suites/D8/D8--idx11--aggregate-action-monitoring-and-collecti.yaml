review_notes: 'This subgoal addresses a gap that single-action safety gates miss: the
  cumulative effect. The "salami attack" framing is deliberate — an adversary (or an
  optimization loop) can achieve a large effect through many small steps that each pass
  individual authorization. The swarm behavior monitoring element extends the SFR text to
  multi-agent deployments where collective emergence is the primary risk vector. Cross-suite:
  D7.1 (oversight and awareness provides the monitoring infrastructure this subgoal
  consumes), D7.7 (risk-based validation gates individual decisions; this subgoal gates
  their accumulation), D8.8 (multi-agent resource management addresses a related allocation
  problem). The threshold calibration process is the most organizationally demanding
  element; without it, thresholds either drift to irrelevance or over-restrict.

  '
