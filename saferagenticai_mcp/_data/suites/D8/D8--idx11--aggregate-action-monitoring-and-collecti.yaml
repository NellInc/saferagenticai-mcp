id: D8::idx11::aggregate-action-monitoring-and-collecti
display_id: "D8.11"
suite_id: D8
suite_title: Goal Termination and Sunsetting
subgoal_title: Aggregate Action Monitoring and Collective Threshold Detection
content_type: process
summary: 'Individual actions may each be authorized and harmless, yet their cumulative effect
  can cross safety or resource thresholds that no single action would breach. This subgoal
  requires monitoring aggregate effects across sessions and time windows, defining explicit
  collective thresholds, and triggering escalation or capability restriction when those
  thresholds are breached. The organizational process includes threshold definition, regular
  review, and corrective-action tracking. The problem is the "salami attack" applied to
  safety: many small, legitimate slices that together consume the whole.

  '
normative_anchors:
  sfrs_addressed:
  - a
  - b
  - c
  evidence_addressed:
  - I
  - II
  - III
  sfrs_not_addressed: []
  evidence_not_addressed: []
process_elements:
- name: Aggregate monitoring architecture design
  cadence: authored pre-launch; reviewed semi-annually and on material capability change
  participants:
  - responsible engineer
  - safety lead
  - site reliability
  maps_to_sfr:
  - a
- name: Threshold definition and calibration
  cadence: initial definition pre-launch; reviewed quarterly and event-driven on threshold
    breach or near-miss
  participants:
  - safety lead
  - product owner
  - domain expert (finance, infrastructure, legal as applicable)
  - executive sponsor for resource thresholds
  maps_to_sfr:
  - b
  - c
- name: Cumulative impact tracking
  cadence: continuous automated tracking; daily triage of near-threshold conditions; weekly
    trend review
  participants:
  - on-call rotation
  - safety lead
  - site reliability
  maps_to_sfr:
  - a
  - b
- name: Escalation and capability restriction protocol
  cadence: triggered on threshold breach; post-breach review within 48 hours; quarterly
    drill
  participants:
  - safety lead
  - on-call
  - product owner
  - executive sponsor for deployment decisions
  maps_to_sfr:
  - b
- name: Threshold review and corrective action tracking
  cadence: quarterly review of all thresholds; event-driven review after any breach;
    corrective actions tracked to closure
  participants:
  - safety lead
  - product owner
  - compliance officer
  - board-level risk committee (informed on material breaches)
  maps_to_sfr:
  - c
- name: Swarm behavior monitoring
  cadence: continuous for multi-agent deployments; weekly pattern review
  participants:
  - responsible engineer
  - safety lead
  - multi-agent systems specialist
  maps_to_sfr:
  - a
triggers:
- Cumulative metric crosses warning threshold (e.g., 80% of limit) → Alert to on-call +
  safety lead
- Cumulative metric crosses hard threshold → Automatic capability restriction + escalation
  to safety lead + incident ticket
- Quarterly calendar → Threshold review with trend analysis
- New capability or new agent added to fleet → Re-assess aggregate thresholds for the
  expanded action surface
- Post-breach review → Corrective action plan with owner and deadline
- Detected coordination pattern across agents → Swarm behavior investigation
artifacts:
- Aggregate monitoring architecture document with signal definitions, aggregation windows,
  and threshold values
- Threshold registry (per action class and per resource type) with calibration history
- Cumulative impact dashboards with trend visualization
- Escalation runbook per threshold class with named roles, SLAs, and capability-restriction
  procedures
- Breach incident reports with root cause, corrective action, and follow-up
- Quarterly threshold review minutes with calibration decisions
- Swarm behavior analysis reports for multi-agent deployments
evidence_production:
- evidence_numeral: I
  how_to_produce: 'Documentation of the aggregate monitoring architecture: which signals are
    aggregated (action counts, resource consumption, cost accrual, data access volume,
    external API calls, affected-entity counts), over what time windows (session, daily,
    weekly, monthly), with what aggregation method (sum, max, percentile), and what
    threshold values. Include the threshold registry as a version-controlled artifact.
    Architecture reviewed and signed off by safety lead.

    '
- evidence_numeral: II
  how_to_produce: 'Test results from scenarios where individually authorized actions
    collectively breach thresholds: synthetic test campaigns that replay sequences of
    legitimate actions until cumulative impact crosses defined limits, verifying that the
    monitoring system detects the breach and triggers the correct escalation. Include both
    single-agent accumulation tests and multi-agent swarm tests. Run at least quarterly
    and on monitoring-system change.

    '
- evidence_numeral: III
  how_to_produce: 'Records of aggregate threshold reviews: for each review cycle, document
    the thresholds examined, data analyzed (breach frequency, near-miss frequency, false
    positive rate), calibration decisions made (threshold adjusted, unchanged, or newly
    defined), and any corrective actions taken in response to breaches since the last
    review. Cross-reference to incident reports where breaches occurred.

    '
